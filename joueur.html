<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cyber Conf — Joueur</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#00ff88;--red:#ff4455;--amber:#ffaa00;--bg:#0a0e14;--bg2:#111620;--bg3:#1a2030;--border:rgba(0,255,136,0.15);--text:#e8edf5;--muted:#6b7a8d;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;overflow-y:auto}
.screen.hidden{display:none!important}

/* JOIN */
.logo{font-family:var(--mono);font-size:20px;color:var(--green);letter-spacing:2px;margin-bottom:6px}
.sub{font-size:13px;color:var(--muted);margin-bottom:28px;font-family:var(--mono)}
.inp{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:14px 18px;font-size:22px;font-family:var(--mono);color:var(--text);text-align:center;width:100%;max-width:300px;outline:none;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px}
.inp:focus{border-color:var(--green)}
.team-wrap{width:100%;max-width:300px;margin-bottom:16px}
.team-lbl{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:8px;text-align:left;letter-spacing:1px}
.tbtn{border-radius:10px;border:2px solid transparent;padding:13px 16px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);width:100%;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:7px;background:var(--bg2);transition:all .15s;color:var(--text)}
.tbtn.sel{border-color:white;box-shadow:0 0 0 2px rgba(255,255,255,.2)}
.tdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.tcnt{margin-left:auto;font-size:11px;font-family:var(--mono);opacity:.6}
.jbtn{background:var(--green);color:#000;border:none;border-radius:12px;padding:15px 0;font-size:18px;font-weight:800;cursor:pointer;font-family:var(--sans);width:100%;max-width:300px}
.jbtn:disabled{opacity:.4}
.err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px;font-family:var(--mono)}

/* LOBBY */
.lobby-code{font-family:var(--mono);font-size:52px;font-weight:700;color:var(--green);letter-spacing:6px;margin-bottom:8px}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* QUESTION */
#screen-question{padding:0;justify-content:flex-start;align-items:stretch}
.qhdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.qtop{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.qtheme{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:20px;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.3);color:var(--amber)}
.qctr{font-size:11px;font-family:var(--mono);color:var(--muted);margin-left:auto}
.qtnum{font-family:var(--mono);font-size:15px;font-weight:700;margin-left:6px}
.tbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.tfill{height:100%;border-radius:3px;transition:width 1s linear,background .5s}
.qbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;padding-bottom:52px}
.qtext{font-size:17px;font-weight:700;line-height:1.4;margin-bottom:16px;text-align:left}
/* NUMBERED answer buttons */
.aopts{display:flex;flex-direction:column;gap:9px;flex:1}
.abtn{border-radius:10px;border:2px solid var(--border);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:12px;padding:14px 16px;transition:all .15s;color:var(--text);text-align:left;line-height:1.3;background:var(--bg2)}
.abtn:active{transform:scale(.97)}
.abtn:disabled{opacity:.45;cursor:not-allowed}
.abtn.sel{border-color:var(--green);background:rgba(0,255,136,.08);color:var(--green)}
.abtn.sent{opacity:.7}
.anum{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--amber);width:22px;flex-shrink:0}

/* PHISHING */
#screen-phishing{padding:0;justify-content:flex-start;align-items:stretch}
.phdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;font-size:13px;font-weight:700}
.pbody{flex:1;overflow-y:auto;padding:14px;padding-bottom:80px}
.fake-email{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.fe-hdr{background:var(--bg3);padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}
.fe-subj{padding:10px 12px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border)}
.fe-body{padding:12px;font-size:13px;line-height:1.8;white-space:pre-line}
.vbtns{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:10px 14px;background:var(--bg2);border-top:1px solid var(--border)}
.vbtn{flex:1;padding:15px;border-radius:9px;border:2px solid;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s}
.vbtn.phish{border-color:var(--red);color:var(--red);background:rgba(255,68,85,.07)}
.vbtn.legit{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.07)}
.vbtn:disabled{opacity:.35;cursor:not-allowed}

/* EMPREINTE */
#screen-empreinte{padding:0;justify-content:flex-start;align-items:stretch}
.ehdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.ebody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;padding-bottom:52px}
.eq-text{font-size:18px;font-weight:700;line-height:1.4;margin-bottom:18px;text-align:left}
.eopts{display:flex;flex-direction:column;gap:8px;flex:1}
.eopt{padding:14px 16px;border-radius:10px;border:2px solid var(--border);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);text-align:left;background:var(--bg2);color:var(--text);transition:all .15s;display:flex;align-items:center;gap:10px}
.eopt.sel{border-color:var(--green);background:rgba(0,255,136,.08);color:var(--green)}
.eopt:active{transform:scale(.98)}
.enum{font-family:var(--mono);font-size:13px;color:var(--amber);font-weight:700;width:20px;flex-shrink:0}
.send-btn{margin-top:14px;background:var(--green);color:#000;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--sans)}
.send-btn:disabled{opacity:.4}

/* CTF */
#screen-ctf{padding:0;justify-content:flex-start;align-items:stretch}
.chdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.cbody{flex:1;overflow-y:auto;padding:14px;padding-bottom:52px}
.ctag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:20px;border:1px solid var(--amber);color:var(--amber);margin-right:6px}
.ccode{background:var(--bg);border-radius:6px;padding:10px;font-family:var(--mono);font-size:12px;color:var(--green);word-break:break-all;margin:10px 0;line-height:1.6}
.ctf-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.ctf-inp{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;font-family:var(--mono);color:var(--text);flex:1;outline:none}
.ctf-inp:focus{border-color:var(--green)}
.ctf-sub{background:var(--green);color:#000;border:none;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--sans);flex-shrink:0}
.hint-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--mono);margin-top:8px}
.hint-txt{font-size:12px;color:var(--amber);padding:8px;background:rgba(255,170,0,.07);border-radius:6px;border:1px solid rgba(255,170,0,.2);margin-top:6px;display:none;font-family:var(--mono);line-height:1.6}
.ctf-result{padding:10px;border-radius:7px;font-size:13px;margin-top:8px;display:none}

/* RESULT */
.res-icon{font-size:68px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.3);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.res-title{font-size:22px;font-weight:800;margin-bottom:8px}
.res-ans{padding:11px 18px;border-radius:9px;font-size:14px;font-weight:600;margin:14px 0;max-width:300px;width:100%}
.res-pts{font-size:44px;font-family:var(--mono);font-weight:700;margin-bottom:6px}
.res-total{font-size:13px;color:var(--muted);font-family:var(--mono)}

/* WAITING */
.wait-icon{font-size:36px;margin-bottom:10px;animation:pulse 1.5s ease-in-out infinite}
.wait-txt{font-size:13px;color:var(--muted);font-family:var(--mono);max-width:280px;line-height:1.6}

/* PODIUM */
.pod-title{font-size:26px;font-weight:800;color:var(--amber);font-family:var(--mono);margin-bottom:6px}
.pod-list{width:100%;max-width:320px;margin-top:16px}
.pod-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--border)}

/* SCORE BAR */
.sbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:10px;font-size:12px;z-index:10}
.sbar.hidden{display:none}
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen" id="screen-join">
  <div class="logo">⚡ CYBER_CONF</div>
  <div class="sub">Rejoindre une session</div>
  <input class="inp" type="text" id="room-inp" placeholder="CODE" maxlength="6" oninput="this.value=this.value.toUpperCase()">
  <div class="team-wrap" id="team-wrap">
    <div class="team-lbl">CHOISIS TON ÉQUIPE</div>
    <div id="team-btns"></div>
  </div>
  <button class="jbtn" onclick="joinRoom()" id="jbtn">Rejoindre →</button>
  <div class="err" id="err"></div>
</div>

<!-- LOBBY -->
<div class="screen hidden" id="screen-lobby">
  <div style="font-size:36px;margin-bottom:14px">👾</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:6px" id="lob-name"></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:20px">connecté · <span id="lob-team"></span></div>
  <div class="lobby-code" id="lob-code"></div>
  <div class="pulse" style="font-size:13px;color:var(--muted);font-family:var(--mono)">En attente du démarrage...</div>
</div>

<!-- QUESTION -->
<div class="screen hidden" id="screen-question">
  <div class="qhdr">
    <div class="qtop">
      <span class="qtheme" id="q-theme">Thème</span>
      <span class="qctr" id="q-ctr">Q1/10</span>
      <span class="qtnum" id="q-tnum">15</span>
    </div>
    <div class="tbar"><div class="tfill" id="q-tfill" style="width:100%;background:var(--green)"></div></div>
  </div>
  <div class="qbody">
    <div class="qtext" id="q-text"></div>
    <div class="aopts" id="q-opts"></div>
  </div>
</div>

<!-- PHISHING -->
<div class="screen hidden" id="screen-phishing">
  <div class="phdr" id="ph-title">🎣 Analyse ce mail</div>
  <div class="pbody" id="ph-body"></div>
  <div class="vbtns">
    <button class="vbtn phish" id="vbtn-phish" onclick="votePhish(true)">⚠ Phishing !</button>
    <button class="vbtn legit" id="vbtn-legit" onclick="votePhish(false)">✓ Légitime</button>
  </div>
</div>

<!-- EMPREINTE -->
<div class="screen hidden" id="screen-empreinte">
  <div class="ehdr">
    <div style="font-size:14px;font-weight:700;margin-bottom:2px">👣 Empreinte Numérique</div>
    <div style="font-size:11px;color:var(--muted);font-family:var(--mono)" id="eq-ctr">Q1/6</div>
  </div>
  <div class="ebody">
    <div class="eq-text" id="eq-text"></div>
    <div class="eopts" id="eq-opts"></div>
    <button class="send-btn" id="eq-send" onclick="sendEmp()" disabled>Valider →</button>
  </div>
</div>

<!-- CTF -->
<div class="screen hidden" id="screen-ctf">
  <div class="chdr">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="ctag" id="c-tag">Tag</span>
      <span style="font-size:14px;font-weight:700" id="c-title">Challenge</span>
      <span style="margin-left:auto;font-size:11px;color:var(--amber);font-family:var(--mono)" id="c-pts">0 pts</span>
    </div>
  </div>
  <div class="cbody">
    <div style="font-size:14px;color:var(--muted);margin-bottom:10px;line-height:1.6" id="c-desc"></div>
    <div class="ccode" id="c-code"></div>
    <div class="ctf-row">
      <input class="ctf-inp" type="text" id="c-inp" placeholder="Ta réponse..." onkeydown="if(event.key==='Enter')submitCTF()">
      <button class="ctf-sub" id="c-subbtn" onclick="submitCTF()">Envoyer</button>
    </div>
    <button class="hint-btn" onclick="toggleHint()">💡 Indice</button>
    <div class="hint-txt" id="c-hint"></div>
    <div class="ctf-result" id="c-result"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="screen-result">
  <div class="res-icon" id="r-icon">✅</div>
  <div class="res-title" id="r-title">Bonne réponse !</div>
  <div class="res-ans" id="r-ans"></div>
  <div class="res-pts" id="r-pts">+0</div>
  <div class="res-total" id="r-total">Total : 0 pts</div>
</div>

<!-- WAITING -->
<div class="screen hidden" id="screen-waiting">
  <div class="wait-icon">⏳</div>
  <div class="wait-txt" id="w-txt">En attente...</div>
</div>

<!-- PODIUM -->
<div class="screen hidden" id="screen-podium">
  <div class="pod-title">🏆 PODIUM</div>
  <div style="font-size:13px;color:var(--muted);font-family:var(--mono)" id="my-rank"></div>
  <div class="pod-list" id="pod-list"></div>
  <div style="margin-top:16px;font-size:12px;color:var(--muted);font-family:var(--mono)">Merci d'avoir joué !</div>
</div>

<!-- SCORE BAR -->
<div class="sbar hidden" id="sbar">
  <div style="font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-name"></div>
  <div style="font-size:11px;color:var(--muted);font-family:var(--mono)" id="sb-rank"></div>
  <div style="font-family:var(--mono);font-weight:700;color:var(--green)" id="sb-pts">0 pts</div>
</div>

<script>
const ABLY_KEY = 'evrpcQ.X7n3VQ:x9AMe7ScSb_lWITGg7KHRUTka7B9ltfMGB0tTiULt9w';
let ably, channel;
let pid = 'p_' + Math.random().toString(36).substr(2,8);
let pname = '', room = '', myTeam = null, myScore = 0, myCorrect = 0;
let teams = [
  {name:'Équipe Rouge', color:'#ff4455', count:0},
  {name:'Équipe Bleue', color:'#4488ff', count:0},
  {name:'Équipe Verte', color:'#00ff88', count:0}
];
let timerDur = 15, timeLeft = 15, timerInt = null;
let answered = false, myAns = -1;
let currentCTF = null, ctfDone = false;
let phishVoted = undefined;
let eqAnswer = null, eqIdx = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-'+id).classList.remove('hidden');
}

function renderTeamBtns() {
  const wrap = document.getElementById('team-wrap');
  const btns = document.getElementById('team-btns');
  if (!teams||!teams.length) { wrap.style.display='none'; return; }
  wrap.style.display='block';
  btns.innerHTML = teams.map(t =>
    '<button class="tbtn'+(myTeam===t.name?' sel':'')+'" '
    +'style="color:'+t.color+';border-color:'+(myTeam===t.name?t.color:'transparent')+'" '
    +'onclick="selectTeam(\''+t.name+'\')">'
    +'<div class="tdot" style="background:'+t.color+'"><\/div>'
    +t.name
    +'<span class="tcnt">'+(t.count||0)+'<\/span><\/button>'
  ).join('');
}

function selectTeam(name) {
  myTeam = name;
  renderTeamBtns();
  document.getElementById('err').textContent = '';
}

function joinRoom() {
  const code = document.getElementById('room-inp').value.trim().toUpperCase();
  const errEl = document.getElementById('err');
  if (!code||code.length<4) { errEl.textContent='Entre le code de la salle'; return; }
  if (!myTeam) { errEl.textContent='Choisis une équipe !'; return; }
  const name = myTeam;
  pname = name; room = code;
  errEl.textContent='';
  document.getElementById('jbtn').disabled=true;
  document.getElementById('jbtn').textContent='Connexion...';
  ably = new Ably.Realtime({ key: ABLY_KEY, clientId: pid });
  ably.connection.on('connected', () => {
    channel = ably.channels.get('cyberconf-'+code);
    subscribeAll();
    channel.publish('player:join', {id:pid, name, team:myTeam});
    const t = teams.find(x=>x.name===myTeam);
    document.getElementById('lob-name').textContent = name;
    document.getElementById('lob-name').style.color = t ? t.color : 'var(--text)';
    document.getElementById('lob-code').textContent = code;
    document.getElementById('lob-team').textContent = myTeam;
    document.getElementById('lob-team').style.color = t ? t.color : 'var(--muted)';
    showScreen('lobby');
  });
  ably.connection.on('failed', () => {
    errEl.textContent='Connexion échouée. Vérifie le code.';
    document.getElementById('jbtn').disabled=false;
    document.getElementById('jbtn').textContent='Rejoindre →';
  });
}

function subscribeAll() {
  channel.subscribe('host:teams', msg => {
    teams = msg.data.teams||[];
    renderTeamBtns();
  });
  channel.subscribe('host:state', msg => {
    if (msg.data.teams&&msg.data.teams.length) teams = msg.data.teams;
    if (msg.data.phase==='lobby') showScreen('lobby');
  });
  channel.subscribe('host:mod_change', msg => {
    showWaiting('Module : '+msg.data.mod+' — en attente...');
  });

  // QUIZ
  channel.subscribe('host:question', msg => {
    if (msg.data.mod!=='quiz') return;
    const {question, timerDuration, index, total} = msg.data;
    timerDur=timerDuration; timeLeft=timerDuration;
    answered=false; myAns=-1;
    document.getElementById('q-theme').textContent=question.theme;
    document.getElementById('q-ctr').textContent='Q'+(index+1)+'/'+total;
    document.getElementById('q-tnum').textContent=timerDuration;
    document.getElementById('q-tfill').style.width='100%';
    document.getElementById('q-tfill').style.background='var(--green)';
    document.getElementById('q-text').textContent=question.q;
    document.getElementById('q-opts').innerHTML = question.opts.map((o,i)=>
      '<button class="abtn" id="qa-'+i+'" onclick="submitQuiz('+i+')">'
      +'<span class="anum">'+(i+1)+'.<\/span><span>'+o+'<\/span><\/button>'
    ).join('');
    showScreen('question');
    document.getElementById('sbar').classList.remove('hidden');
    updateSbar();
    startClientTimer();
  });

  channel.subscribe('host:tick', msg => { timeLeft=msg.data.timeLeft; updateTimerUI(); });

  channel.subscribe('host:reveal', msg => {
    if (msg.data.mod==='phishing') {
      showWaiting((msg.data.isPhish ? '⚠ C\'était du phishing !' : '✓ Mail légitime') + '\n\n' + msg.data.expl);
      return;
    }
    if (msg.data.mod!=='quiz') return;
    clearInterval(timerInt);
    const {correct, correctText, expl, scores} = msg.data;
    const wasCorrect = answered && myAns===correct;
    if (scores&&scores[pid]) {
      const pts = scores[pid].score - myScore;
      myScore = scores[pid].score; myCorrect = scores[pid].correct;
      showResult(wasCorrect, correct, correctText, pts, expl);
    } else {
      showResult(wasCorrect, correct, correctText, 0, expl);
    }
  });

  channel.subscribe('host:podium', msg => {
    clearInterval(timerInt);
    showPodium(msg.data.scores, msg.data.teams||[]);
    document.getElementById('sbar').classList.add('hidden');
  });

  channel.subscribe('host:reset', () => {
    myScore=0; myCorrect=0;
    document.getElementById('sbar').classList.add('hidden');
    showScreen('lobby');
  });

  // PHISHING
  channel.subscribe('host:phishing', msg => {
    phishVoted=undefined;
    const cas=msg.data.cas;
    document.getElementById('ph-title').textContent='🎣 '+cas.title;
    let body='';
    if (cas.type==='email') {
      body='<div class="fake-email">'
        +'<div class="fe-hdr"><div><span style="color:var(--muted)">De : <\/span><strong>'+cas.from+'<\/strong><\/div>'
        +'<div><span style="color:var(--muted)">Objet : <\/span><strong>'+cas.subject+'<\/strong><\/div><\/div>'
        +'<div class="fe-body">'+cas.body+'<\/div><\/div>';
    } else {
      body='<div class="fake-email">'
        +'<div class="fe-hdr" style="font-family:var(--mono);font-size:11px">'+(cas.lock?'🔒':'⚠')+' '+cas.url+'<\/div>'
        +'<div class="fe-body">'+cas.body+'<\/div><\/div>';
    }
    document.getElementById('ph-body').innerHTML=body;
    document.getElementById('vbtn-phish').disabled=false;
    document.getElementById('vbtn-legit').disabled=false;
    document.getElementById('vbtn-phish').style.opacity='1';
    document.getElementById('vbtn-legit').style.opacity='1';
    showScreen('phishing');
    document.getElementById('sbar').classList.remove('hidden');
    updateSbar();
  });

  // EMPREINTE
  channel.subscribe('host:empreinte', msg => {
    eqIdx=msg.data.index; eqAnswer=null;
    document.getElementById('eq-ctr').textContent='Q'+(eqIdx+1)+'/'+msg.data.total;
    document.getElementById('eq-text').textContent=msg.data.question;
    document.getElementById('eq-opts').innerHTML = msg.data.opts.map((o,i)=>
      '<button class="eopt" id="eo-'+i+'" onclick="selectEQ('+i+')">'
      +'<span class="enum">'+(i+1)+'.<\/span><span>'+o+'<\/span><\/button>'
    ).join('');
    document.getElementById('eq-send').disabled=true;
    document.getElementById('eq-send').textContent='Valider →';
    showScreen('empreinte');
    document.getElementById('sbar').classList.remove('hidden');
    updateSbar();
  });
  channel.subscribe('host:empreinte_end', () => showWaiting('Empreinte terminée !'));

  // CTF
  channel.subscribe('host:ctf', msg => {
    ctfDone=false; currentCTF=msg.data;
    document.getElementById('c-tag').textContent=msg.data.tag;
    document.getElementById('c-title').textContent=msg.data.title;
    document.getElementById('c-pts').textContent=msg.data.pts+' pts';
    document.getElementById('c-desc').textContent=msg.data.desc;
    document.getElementById('c-code').textContent=msg.data.code;
    document.getElementById('c-hint').textContent=msg.data.hint;
    document.getElementById('c-hint').style.display='none';
    document.getElementById('c-inp').value='';
    document.getElementById('c-inp').disabled=false;
    document.getElementById('c-subbtn').disabled=false;
    document.getElementById('c-result').style.display='none';
    showScreen('ctf');
    document.getElementById('sbar').classList.remove('hidden');
    updateSbar();
  });
  channel.subscribe('host:ctf_result', msg => {
    if (msg.data.playerId!==pid) return;
    const r=document.getElementById('c-result');
    r.style.display='block';
    if (msg.data.correct) {
      myScore+=msg.data.pts; myCorrect++;
      r.style.cssText='display:block;background:rgba(0,255,136,.08);border:1px solid var(--green);color:var(--green);padding:10px;border-radius:7px;font-size:13px';
      r.textContent='✓ Correct ! +'+msg.data.pts+' pts';
      ctfDone=true;
      document.getElementById('c-inp').disabled=true;
      document.getElementById('c-subbtn').disabled=true;
      updateSbar();
    } else {
      r.style.cssText='display:block;background:rgba(255,68,85,.08);border:1px solid var(--red);color:#ff9999;padding:10px;border-radius:7px;font-size:13px';
      r.textContent='✗ Pas encore... Réessaie !';
    }
  });

  window.addEventListener('beforeunload', ()=>channel.publish('player:leave',{id:pid}));
}

// QUIZ
function submitQuiz(i) {
  if (answered) return;
  answered=true; myAns=i;
  document.querySelectorAll('.abtn').forEach((b,j)=>{
    b.disabled=true;
    if (j===i) b.classList.add('sel');
    else b.style.opacity='.35';
  });
  channel.publish('player:answer',{id:pid,answer:i,timeRemaining:timeLeft,mod:'quiz'});
}
function startClientTimer() {
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-1);
    updateTimerUI();
    if(timeLeft<=0){clearInterval(timerInt);if(!answered){answered=true;document.querySelectorAll('.abtn').forEach(b=>b.disabled=true);}}
  },1000);
}
function updateTimerUI() {
  const pct=timeLeft/timerDur*100, c=pct>50?'var(--green)':pct>25?'var(--amber)':'var(--red)';
  const n=document.getElementById('q-tnum'),f=document.getElementById('q-tfill');
  if(n){n.textContent=timeLeft;n.style.color=c;}
  if(f){f.style.width=pct+'%';f.style.background=c;}
}
function showResult(correct, correctIdx, correctText, pts, expl) {
  document.getElementById('r-icon').textContent=correct?'✅':'❌';
  document.getElementById('r-title').textContent=correct?'Bonne réponse !':'Raté !';
  document.getElementById('r-pts').textContent=correct?'+'+pts:'+0';
  document.getElementById('r-pts').style.color=correct?'var(--green)':'var(--red)';
  document.getElementById('r-total').textContent='Total : '+myScore+' pts · '+myCorrect+' ✓';
  const a=document.getElementById('r-ans');
  a.textContent='✓ '+(correctIdx+1)+'. '+correctText;
  a.style.cssText='background:rgba(0,255,136,.08);border:1px solid var(--green);color:var(--green);padding:11px 18px;border-radius:9px;font-size:14px;font-weight:600;margin:14px 0;max-width:300px;width:100%';
  updateSbar();
  showScreen('result');
}

// PHISHING
function votePhish(isPhish) {
  if (phishVoted!==undefined) return;
  phishVoted=isPhish;
  document.getElementById('vbtn-phish').disabled=true;
  document.getElementById('vbtn-legit').disabled=true;
  document.getElementById('vbtn-phish').style.opacity=isPhish?'1':'.3';
  document.getElementById('vbtn-legit').style.opacity=!isPhish?'1':'.3';
  channel.publish('player:answer',{id:pid,answer:isPhish,mod:'phishing'});
  showWaiting('Vote envoyé !\nEn attente de la révélation...');
}

// EMPREINTE
function selectEQ(i) {
  eqAnswer=i;
  document.querySelectorAll('.eopt').forEach((el,j)=>el.classList.toggle('sel',j===i));
  document.getElementById('eq-send').disabled=false;
}
function sendEmp() {
  if (eqAnswer===null) return;
  channel.publish('player:answer',{id:pid,answer:{qIndex:eqIdx,val:eqAnswer},mod:'empreinte'});
  document.getElementById('eq-send').disabled=true;
  document.getElementById('eq-send').textContent='✓ Réponse envoyée';
  showWaiting('Réponse envoyée !\nEn attente de la prochaine question...');
}

// CTF
function submitCTF() {
  if (!currentCTF||ctfDone) return;
  const val=document.getElementById('c-inp').value.trim();
  if (!val) return;
  channel.publish('player:answer',{id:pid,answer:{challengeId:currentCTF.challengeId,text:val},mod:'ctf'});
}
function toggleHint() {
  const h=document.getElementById('c-hint');
  h.style.display=h.style.display==='none'?'block':'none';
}

// UTILS
function showWaiting(txt) {
  document.getElementById('w-txt').textContent=txt||'En attente...';
  showScreen('waiting');
}
function showPodium(scores, teamScores) {
  const r=['🥇','🥈','🥉'];
  const myRank=scores.findIndex(s=>s.name===pname);
  document.getElementById('my-rank').textContent=myRank>=0?'Tu es '+(r[myRank]||'#'+(myRank+1))+' avec '+myScore+' pts':'';
  let html='';
  if(teamScores&&teamScores.length){
    html+='<div style="font-size:11px;color:var(--amber);font-family:var(--mono);margin-bottom:6px;text-align:left">ÉQUIPES<\/div>';
    html+=teamScores.map((ts,i)=>'<div class="pod-row" style="border-color:'+ts.color+'"><div style="font-size:16px;width:26px">'+r[i]+'<\/div><div style="flex:1;font-size:13px;font-weight:600;text-align:left;color:'+ts.color+'">'+ts.name+'<\/div><div style="font-family:var(--mono);font-size:14px;font-weight:700;color:'+ts.color+'">'+ts.total+'<\/div><\/div>').join('');
    html+='<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin:10px 0 6px;text-align:left">INDIVIDUEL<\/div>';
  }
  html+=scores.slice(0,8).map((s,i)=>'<div class="pod-row" style="'+(s.name===pname?'border-color:var(--green)':'')+'"><div style="font-size:16px;width:26px">'+(r[i]||'#'+(i+1))+'<\/div><div style="flex:1;font-size:13px;font-weight:600;text-align:left;'+(s.name===pname?'color:var(--green)':'')+'">'+s.name+'<\/div><div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green)">'+s.score+'<\/div><\/div>').join('');
  document.getElementById('pod-list').innerHTML=html;
  showScreen('podium');
}
function updateSbar() {
  const t=myTeam?teams.find(x=>x.name===myTeam):null;
  document.getElementById('sb-name').textContent=(t?myTeam:'Joueur');
  if(t) document.getElementById('sb-name').style.color=t.color;
  document.getElementById('sb-pts').textContent=myScore+' pts';
}

// Show teams on load
document.addEventListener('DOMContentLoaded', function() { renderTeamBtns(); });

// Pre-fill room from URL
const up = new URLSearchParams(window.location.search);
if (up.get('room')) document.getElementById('room-inp').value = up.get('room').toUpperCase();
</script>
