<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Conf — Animateur</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00ff88;--red:#ff4455;--amber:#ffaa00;--blue:#4af;--bg:#0a0e14;--bg2:#111620;--bg3:#1a2030;--bg4:#222b3a;--border:rgba(0,255,136,0.12);--border2:rgba(0,255,136,0.28);--text:#e8edf5;--muted:#6b7a8d;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px}
.logo{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:1px}
.pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid}
.pill.on{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}
.pill.off{border-color:var(--red);color:var(--red);background:rgba(255,68,85,.08)}
.pill.am{border-color:var(--amber);color:var(--amber);background:rgba(255,170,0,.08)}
.ml{margin-left:auto}
.main{display:grid;grid-template-columns:240px 1fr 270px;overflow:hidden;height:100%}
.panel{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:14px}
.pr{border-right:none;border-left:1px solid var(--border)}
.pt{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;padding-top:12px;border-top:1px solid var(--border)}
.pt.first{margin-top:0;padding-top:0;border-top:none}
.nb{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);border:1px solid transparent;background:none;width:100%;text-align:left;font-family:var(--sans);transition:all .15s;margin-bottom:3px}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.act{background:var(--bg3);color:var(--green);border-color:var(--border)}
.nb .ic{width:18px;text-align:center;flex-shrink:0}
.center{overflow-y:auto;padding:20px;background:var(--bg)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.btn{padding:9px 18px;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s}
.bg{background:var(--green);color:#000;border-color:var(--green)}.bg:hover{opacity:.85}
.bo{background:none;color:var(--text);border-color:var(--border2)}.bo:hover{background:var(--bg3)}
.bsm{padding:5px 11px;font-size:11px}
.btn:disabled{opacity:.35;cursor:not-allowed}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:12px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--border2)}
.flex{display:flex;gap:8px;align-items:center}
.sl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.div{height:1px;background:var(--border);margin:10px 0}
.srow{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;background:var(--bg3);margin-bottom:5px}
.sr-rank{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px}
.sr-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-pts{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)}
.tbar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:14px}
.tfill{height:100%;border-radius:4px;transition:width 1s linear,background .5s}
.abar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.abar-lbl{width:22px;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.abar-track{flex:1;height:26px;background:var(--bg4);border-radius:5px;overflow:hidden}
.abar-fill{height:100%;border-radius:5px;transition:width .4s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#000}
.abar-n{font-family:var(--mono);font-size:11px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.prow{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;background:var(--bg3);margin-bottom:4px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.trow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;background:var(--bg3);margin-bottom:5px;border-left:3px solid transparent}
.qr-box{text-align:center;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);margin-bottom:10px}
.qr-url{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;word-break:break-all}
.pdots{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.pd{height:4px;flex:1;min-width:4px;border-radius:2px;background:var(--bg4)}
.pd.done{background:var(--green)}.pd.cur{background:var(--amber)}
.toast{position:fixed;bottom:14px;right:14px;background:var(--bg2);border:1px solid var(--green);border-radius:7px;padding:8px 14px;font-size:11px;font-family:var(--mono);color:var(--green);z-index:99;opacity:0;transform:translateY(16px);transition:all .25s}
.toast.show{opacity:1;transform:translateY(0)}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.opt-box{padding:11px 14px;border-radius:7px;border:1px solid var(--border);font-size:13px;margin-bottom:8px;background:var(--bg3)}
.opt-num{font-family:var(--mono);font-weight:700;margin-right:8px;color:var(--amber)}
.cpick{width:34px;height:30px;border:none;border-radius:5px;cursor:pointer;padding:2px;background:var(--bg4);flex-shrink:0}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="topbar">
    <div class="logo">CYBER_CONF<span class="blink">_</span> ANIMATEUR</div>
    <div class="pill off" id="conn-pill">⬤ Connexion...</div>
    <div class="pill am" id="room-pill">Room: —</div>
    <div id="pcount" style="font-family:var(--mono);font-size:11px;color:var(--muted)">0 joueurs</div>
    <div class="ml flex"><div class="pill am" id="phase-pill">lobby</div></div>
  </div>
  <div class="main">
    <!-- LEFT -->
    <div class="panel">
      <div class="pt first">Modules</div>
      <button class="nb act" id="nb-quiz" onclick="switchMod('quiz')"><span class="ic">❓</span>Quiz / Kahoot</button>
      <button class="nb" id="nb-phishing" onclick="switchMod('phishing')"><span class="ic">🎣</span>Phishing / Vrai-Fake</button>
      <button class="nb" id="nb-empreinte" onclick="switchMod('empreinte')"><span class="ic">👣</span>Empreinte Numérique</button>
      <button class="nb" id="nb-ctf" onclick="switchMod('ctf')"><span class="ic">🚩</span>CTF Initiation</button>
      <button class="nb" id="nb-password" onclick="switchMod('password')"><span class="ic">🔑</span>Password (démo)</button>
      <button class="nb" id="nb-cyber" onclick="switchMod('cyber')"><span class="ic">💬</span>Cyberharcèlement</button>

      <div class="pt">Équipes</div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc0" value="#ff4455"><input type="text" id="tn0" value="Équipe Rouge"></div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc1" value="#4488ff"><input type="text" id="tn1" value="Équipe Bleue"></div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc2" value="#00ff88"><input type="text" id="tn2" value="Équipe Verte"></div>
      <button class="btn bg bsm" style="width:100%;margin-top:4px" onclick="broadcastTeams()">📡 Envoyer aux joueurs</button>
      <div id="live-teams" style="margin-top:8px"></div>

      <div class="pt">Quiz — options</div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px">
        <label style="font-size:11px;color:var(--muted);width:50px;flex-shrink:0">Thème</label>
        <select id="theme-sel" onchange="applyTheme()" style="font-size:11px">
          <option value="">Tous</option>
          <option value="Mots de passe">🔑 Mots de passe</option>
          <option value="Phishing">🎣 Phishing</option>
          <option value="Réseaux sociaux">📱 Réseaux sociaux</option>
          <option value="Cadre légal">⚖️ Cadre légal</option>
          <option value="Malwares">🦠 Malwares</option>
          <option value="WiFi & réseau">📡 WiFi & réseau</option>
          <option value="Bonnes pratiques">✅ Pratiques</option>
          <option value="IA & Deepfakes">🤖 IA & Deepfakes</option>
          <option value="Métiers cyber">💼 Métiers</option>
          <option value="Culture cyber">🌐 Culture</option>
          <option value="Cyberharcèlement">💬 Cyberharcèlement</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <label style="font-size:11px;color:var(--muted);width:50px;flex-shrink:0">Timer</label>
        <select id="timer-sel" style="font-size:11px">
          <option value="10">10s</option><option value="15" selected>15s</option>
          <option value="20">20s</option><option value="30">30s</option>
        </select>
      </div>

      <div class="pt">Rejoindre</div>
      <div class="qr-box"><div id="qr-container"></div><div class="qr-url" id="qr-url">En attente de connexion...</div></div>
      <button class="btn bo bsm" style="width:100%" onclick="copyUrl()">📋 Copier le lien</button>
    </div>

    <!-- CENTER -->
    <div class="center" id="center">
      <div style="text-align:center;padding:60px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">⚡</div>
        <div style="font-family:var(--mono);font-size:13px">Connexion en cours...</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel pr">
      <div class="pt first">Classement équipes</div>
      <div id="team-sb"><div style="font-size:11px;color:var(--muted)">Envoie les équipes →</div></div>
      <div class="pt">Joueurs connectés</div>
      <div id="players-list"><div style="font-size:11px;color:var(--muted)">En attente...</div></div>
      <div class="pt">Réponses en direct</div>
      <div id="live-answers"><div style="font-size:11px;color:var(--muted)">—</div></div>
      <div class="pt">Scores individuels</div>
      <div id="indiv-sb"><div style="font-size:11px;color:var(--muted)">Aucun score</div></div>
    </div>
  </div>
</div>

<script>
const ABLY_KEY = 'evrpcQ.X7n3VQ:x9AMe7ScSb_lWITGg7KHRUTka7B9ltfMGB0tTiULt9w';
const ROOM = Math.random().toString(36).substr(2,6).toUpperCase();

const QUIZ = [
  {theme:"Mots de passe",q:"Quelle est la longueur minimale recommandée pour un mot de passe sécurisé ?",opts:["6 caractères", "8 caractères", "12 caractères", "20 caractères"],correct:2,expl:"12 caractères est le minimum recommandé aujourd\'hui. En dessous, un mot de passe peut être cracké en quelques heures avec du matériel moderne. L\'idéal est 16+ caractères."},
  {theme:"Mots de passe",q:"Qu\'est-ce qu\'un gestionnaire de mots de passe ?",opts:["Un carnet papier sécurisé", "Un logiciel qui génère et stocke des mots de passe chiffrés", "Un service qui remet à zéro vos mots de passe", "Un antivirus spécialisé"],correct:1,expl:"Un gestionnaire comme Bitwarden ou KeePass génère des mots de passe forts et uniques pour chaque site, et les stocke chiffrés. Vous n\'avez à retenir qu\'un seul mot de passe maître."},
  {theme:"Mots de passe",q:"Lequel de ces mots de passe est le plus sécurisé ?",opts:["P@ssw0rd!", "monanniversary2001", "xK#9mL!vQ2$pN7@w", "Ilovemycat123"],correct:2,expl:"xK#9mL!vQ2$pN7@w est le plus fort : 16 caractères, mélange de majuscules, minuscules, chiffres et symboles, aucun mot du dictionnaire. Les autres contiennent des mots ou patterns prévisibles."},
  {theme:"Mots de passe",q:"Que signifie 2FA ?",opts:["Two Factor Application", "Two Factor Authentication", "Two Firewall Access", "Two File Archive"],correct:1,expl:"2FA = Two Factor Authentication (authentification à deux facteurs). Elle combine deux éléments : quelque chose que vous savez (mot de passe) et quelque chose que vous avez (téléphone, clé physique)."},
  {theme:"Mots de passe",q:"Un attaquant obtient ton hash de mot de passe. Quelle attaque utilise-t-il en premier ?",opts:["Attaque par dictionnaire", "SQL injection", "Man-in-the-middle", "DDoS"],correct:0,expl:"L\'attaque par dictionnaire teste des milliers de mots de passe courants hashés. C\'est pourquoi \'password123\' ou \'azerty\' sont dangereux : ils figurent dans toutes ces listes."},
  {theme:"Mots de passe",q:"Que vaut mieux faire si un site t\'impose un mot de passe de max 8 caractères ?",opts:["Utiliser le même que partout", "Signaler que c'est une mauvaise pratique de sécurité", "Mettre ton prénom + date de naissance", "C'est suffisant, 8 caractères c'est bien"],correct:1,expl:"Limiter à 8 caractères est une mauvaise pratique. Cela indique souvent que le site stocke les mots de passe en clair ou avec un hash faible. Tu peux le signaler ou éviter ce site."},
  {theme:"Mots de passe",q:"Qu\'est-ce qu\'une attaque brute force sur un mot de passe ?",opts:["Voler physiquement l'ordinateur", "Tester toutes les combinaisons possibles automatiquement", "Deviner le mot de passe par ingénierie sociale", "Intercepter le mot de passe sur le réseau"],correct:1,expl:"Le brute force teste automatiquement toutes les combinaisons possibles. Un mot de passe de 6 chiffres peut être cracké en secondes. C\'est pourquoi la longueur et la complexité sont essentielles."},
  {theme:"Mots de passe",q:"Quelle méthode 2FA est la PLUS sécurisée ?",opts:["SMS", "Email", "Application TOTP (Google Authenticator)", "Question secrète"],correct:2,expl:"Une appli TOTP génère des codes temporaires localement. Le SMS est vulnérable au SIM swapping. L\'email peut être compromis. Les questions secrètes sont facilement devinables."},
  {theme:"Mots de passe",q:"Pour retenir un mot de passe sans gestionnaire, quelle technique est la meilleure ?",opts:["Ton prénom + année de naissance", "Une phrase de passe : MonChatMangeDuRizLeVendredi!", "Le nom de ton animal en majuscules", "Remplacer les a par @ dans un mot courant"],correct:1,expl:"Une phrase de passe longue est facile à retenir et très difficile à craquer. 30 caractères avec variété — bien mieux que des substitutions prévisibles comme a vers @."},
  {theme:"Mots de passe",q:"Selon l\'ANSSI, quand faut-il changer ses mots de passe ?",opts:["Tous les mois", "Tous les 3 mois", "Seulement en cas de suspicion de compromission", "Tous les ans obligatoirement"],correct:2,expl:"L\'ANSSI recommande de changer un mot de passe uniquement s\'il est compromis ou suspecté de l\'être. Changer trop souvent pousse les utilisateurs à créer des mots de passe plus faibles."},
  {theme:"Phishing",q:"Quel pourcentage des cyberattaques commence par du phishing ?",opts:["Environ 30%", "Environ 50%", "Plus de 80%", "Moins de 20%"],correct:2,expl:"Plus de 80% des cyberattaques commencent par du phishing. C\'est la technique d\'entrée favorite car il est souvent plus simple de tromper un humain que de casser un système."},
  {theme:"Phishing",q:"Qu\'est-ce que le spear phishing ?",opts:["Un phishing ciblant les pêcheurs", "Un phishing personnalisé visant une personne ou organisation précise", "Un phishing par SMS", "Un phishing utilisant de faux sites"],correct:1,expl:"Le spear phishing est ciblé : l\'attaquant se renseigne sur sa victime (réseaux sociaux, LinkedIn) pour rédiger un message ultra-personnalisé et crédible, contrairement au phishing de masse."},
  {theme:"Phishing",q:"Tu reçois un email de ta banque demandant de vérifier ton compte. Que fais-tu ?",opts:["Tu cliques sur le lien et renseignes tes infos", "Tu appelles le numéro dans l'email", "Tu vas directement sur le site officiel de ta banque", "Tu réponds à l'email"],correct:2,expl:"Va toujours directement sur le site officiel en tapant l\'URL toi-même. Ne clique jamais sur les liens d\'emails urgents. Les banques ne demandent jamais tes identifiants par email."},
  {theme:"Phishing",q:"Qu\'est-ce que le vishing ?",opts:["Phishing par email", "Phishing par SMS", "Phishing par appel téléphonique", "Phishing via les réseaux sociaux"],correct:2,expl:"Le vishing (voice phishing) utilise des appels téléphoniques. L\'attaquant se fait passer pour une banque, la police ou un support technique pour obtenir des informations sensibles."},
  {theme:"Phishing",q:"Comment reconnaître un email de phishing ?",opts:["Fautes d'orthographe uniquement", "Expéditeur inconnu uniquement", "Urgence + lien suspect + expéditeur douteux + demande d'infos sensibles", "Logo de mauvaise qualité uniquement"],correct:2,expl:"Un phishing combine souvent : urgence artificielle, lien suspect, adresse email bizarre, demande de mot de passe ou numéro de carte. Un seul indice ne suffit pas."},
  {theme:"Phishing",q:"Qu\'est-ce que le smishing ?",opts:["Phishing par email", "Phishing par SMS", "Phishing par appel téléphonique", "Phishing par courrier postal"],correct:1,expl:"Le smishing = SMS + phishing. Tu reçois un SMS d\'un faux livreur, fausse banque ou faux gouvernement avec un lien malveillant. Les SMS semblent plus dignes de confiance que les emails."},
  {theme:"Phishing",q:"Un collègue te demande par email de virer de l\'argent en urgence de la part du directeur. C\'est quoi ?",opts:["Une demande légitime si elle vient d'un email pro", "Une fraude au président (BEC)", "Du spear phishing uniquement", "Une attaque par ransomware"],correct:1,expl:"C\'est une fraude au président (BEC). Les attaquants usurpent l\'identité d\'un dirigeant pour faire des virements urgents. Toujours vérifier par téléphone avant tout virement."},
  {theme:"Phishing",q:"HTTPS dans l\'URL garantit que...",opts:["Le site est légitime et sécurisé", "La connexion est chiffrée mais le site peut être frauduleux", "Le site est certifié par le gouvernement", "Aucune donnée ne peut être volée"],correct:1,expl:"HTTPS chiffre la connexion entre toi et le site, mais ne garantit PAS la légitimité du site. Un site de phishing peut avoir un certificat HTTPS valide. Vérifie toujours le domaine exact."},
  {theme:"Phishing",q:"Tu survoles un lien et l\'URL est amaz0n.fr. Que fais-tu ?",opts:["Tu cliques, c'est probablement une faute de frappe", "Tu ignores le lien et vas sur amazon.fr directement", "Tu cliques si le texte affiche Amazon", "Tu envoies l'email à tes amis"],correct:1,expl:"amaz0n (avec un zéro) est un domaine frauduleux imitant Amazon. Cette technique s\'appelle le typosquatting. Toujours vérifier l\'URL exacte, jamais le texte affiché du lien."},
  {theme:"Phishing",q:"Qu\'est-ce que l\'ingénierie sociale ?",opts:["Construire des serveurs sécurisés", "Manipuler psychologiquement des personnes pour obtenir des informations ou accès", "Programmer des algorithmes de sécurité", "Analyser le code source de logiciels"],correct:1,expl:"L\'ingénierie sociale exploite la psychologie humaine : urgence, autorité, peur, curiosité. C\'est souvent plus efficace que les attaques techniques. Kevin Mitnick l\'utilisait principalement."},
  {theme:"Réseaux sociaux",q:"Qu\'est-ce que l\'empreinte numérique ?",opts:["Un scanner d'empreinte digitale", "L'ensemble des traces laissées par ton activité en ligne", "Ton profil sur les réseaux sociaux uniquement", "Ton historique de navigation"],correct:1,expl:"L\'empreinte numérique englobe tout : historique, posts, likes, localisation, achats, recherches... Ces données permettent de construire un profil très précis de toi."},
  {theme:"Réseaux sociaux",q:"Pourquoi est-il dangereux de publier une photo de tes billets d\'avion ?",opts:["Les billets peuvent être revendus", "Le code-barres contient tes données personnelles", "Ça révèle que tu seras absent de chez toi", "Les deux dernières réponses sont correctes"],correct:3,expl:"Double danger : le code-barres contient des infos personnelles, et publier une photo annonce que tu seras absent, ce qui peut attirer les cambrioleurs."},
  {theme:"Réseaux sociaux",q:"Facebook/Meta utilise tes données principalement pour...",opts:["Améliorer la sécurité d'internet", "Vendre des publicités ciblées", "Partager avec les gouvernements", "Faire de la recherche médicale"],correct:1,expl:"Le modèle économique des réseaux sociaux gratuits repose sur la publicité ciblée. Tes données sont analysées pour afficher des pubs ultra-personnalisées."},
  {theme:"Réseaux sociaux",q:"Qu\'est-ce que le doxing ?",opts:["Publier des documents confidentiels d'une entreprise", "Collecter et publier les infos personnelles d'une personne sans son consentement", "Pirater un compte de réseau social", "Supprimer ses données en ligne"],correct:1,expl:"Le doxing consiste à publier des infos personnelles (adresse, téléphone...) pour nuire. C\'est illégal en France et peut mener à du harcèlement, des menaces ou pire."},
  {theme:"Réseaux sociaux",q:"Que signifie privacy by default ?",opts:["Les données sont publiques par défaut", "Les paramètres les plus protecteurs sont activés par défaut", "L'utilisateur choisit tout à l'inscription", "La vie privée est garantie par la loi"],correct:1,expl:"Privacy by default signifie que le maximum de protection est activé sans action de l\'utilisateur. C\'est une exigence du RGPD pour les entreprises."},
  {theme:"Réseaux sociaux",q:"Tu supprimes ton compte Instagram. Tes données sont-elles effacées immédiatement ?",opts:["Oui, immédiatement", "Non, conservées jusqu'à 90 jours", "Non, conservées indéfiniment", "Oui, mais seulement les photos"],correct:1,expl:"Meta conserve les données jusqu\'à 90 jours après suppression. Les données partagées avec d\'autres (messages, commentaires) peuvent persister. La suppression numérique n\'est jamais instantanée."},
  {theme:"Réseaux sociaux",q:"Qu\'est-ce qu\'un réseau social utilise pour maximiser ton temps d\'écran ?",opts:["Un algorithme basé sur ta popularité", "Un algorithme optimisé pour maximiser ton engagement", "Un système de vote communautaire", "Un tirage au sort équitable"],correct:1,expl:"Les algorithmes favorisent le contenu émotionnel, choquant ou polémique car il génère plus de clics et likes. Ils sont optimisés pour ton engagement, pas ton bien-être."},
  {theme:"Réseaux sociaux",q:"Quel risque y a-t-il à utiliser Se connecter avec Google sur d\'autres sites ?",opts:["Aucun, c'est plus sécurisé", "Google accède aux données et si ton compte est piraté tous les sites liés sont compromis", "Ton mot de passe Google est partagé", "C'est interdit par le RGPD"],correct:1,expl:"En centralisant via Google/Facebook, si ce compte est compromis, tous les services liés le sont aussi. Pratique mais risqué."},
  {theme:"Réseaux sociaux",q:"Quel est le danger de publier ta localisation en temps réel ?",opts:["Aucun si tes amis sont de confiance", "Révéler que tu es absent et permettre de te localiser physiquement", "Seulement un risque de spam", "Uniquement si le compte est public"],correct:1,expl:"Risques : cambriolage, stalking, agression. Même en compte privé, tes amis peuvent partager ces infos. Ne jamais publier sa localisation en temps réel."},
  {theme:"Réseaux sociaux",q:"Qu\'est-ce que l\'OSINT ?",opts:["Un type de ransomware", "La collecte d'informations à partir de sources publiques", "Un protocole de chiffrement", "Un type d'antivirus"],correct:1,expl:"OSINT = Open Source Intelligence. Collecte d\'infos disponibles publiquement (réseaux sociaux, sites web, registres...). Utilisé par chercheurs et journalistes, mais aussi par les attaquants."},
  {theme:"Cadre légal",q:"Quelle loi française punit l\'accès non autorisé à un système informatique ?",opts:["Loi Informatique et Libertés", "Loi Godfrain (1988)", "RGPD", "Loi HADOPI"],correct:1,expl:"La loi Godfrain (1988) punit l\'accès frauduleux à un système : jusqu\'à 2 ans de prison et 60 000€ d\'amende, même sans modification des données."},
  {theme:"Cadre légal",q:"Que signifie RGPD ?",opts:["Règlement Général sur la Protection des Données", "Réseau Global de Protection Digitale", "Règlement sur la Gestion des Programmes Dangereux", "Registre Général des Personnes en Danger"],correct:0,expl:"Le RGPD (2018) est le règlement européen sur la protection des données personnelles. Il donne aux citoyens des droits sur leurs données et impose des obligations aux entreprises."},
  {theme:"Cadre légal",q:"Un mineur de 15 ans pirate le site de son école pour rire. Que risque-t-il ?",opts:["Rien, il est mineur", "Un simple avertissement scolaire", "Des poursuites pénales adaptées aux mineurs", "Uniquement une amende de ses parents"],correct:2,expl:"La minorité n\'exonère pas de responsabilité pénale. Un mineur peut être jugé par un tribunal pour enfants et faire l\'objet de mesures éducatives ou d\'emprisonnement."},
  {theme:"Cadre légal",q:"Quelle est la sanction maximale RGPD pour une entreprise ?",opts:["1 000€", "10 000€", "20 millions d euros ou 4% du CA mondial", "100 000€"],correct:2,expl:"Le RGPD prévoit des amendes jusqu\'à 20 millions d\'euros ou 4% du CA mondial. Amazon a reçu 746 millions d\'euros d\'amende en 2021."},
  {theme:"Cadre légal",q:"Qu\'est-ce que l\'ANSSI ?",opts:["Association Nationale de Sécurité des SI", "Agence Nationale de la Sécurité des Systèmes d'Information", "Administration Nationale des Services Secrets", "Autorité Nationale de Surveillance Internet"],correct:1,expl:"L\'ANSSI est l\'agence gouvernementale française de cybersécurité. Elle publie des recommandations, aide les victimes et défend les systèmes critiques de l\'État."},
  {theme:"Cadre légal",q:"Est-il légal de scanner un site sans autorisation même sans exploiter les failles ?",opts:["Oui si on ne modifie rien", "Oui si c'est pour aider le site", "Non, le simple scan non autorisé est illégal", "Oui si on est chercheur en sécurité"],correct:2,expl:"Scanner un système sans autorisation explicite est illégal en France, même sans intention malveillante. Les programmes de bug bounty encadrent légalement ces recherches."},
  {theme:"Cadre légal",q:"Que protège principalement la directive NIS 2 ?",opts:["Les données personnelles des citoyens", "La cybersécurité des secteurs critiques (hôpitaux, énergie, transports)", "Les droits d'auteur sur internet", "La liberté d'expression en ligne"],correct:1,expl:"NIS 2 impose des obligations de cybersécurité aux opérateurs essentiels : hôpitaux, énergie, eau, transport, banques, avec des sanctions en cas de non-conformité."},
  {theme:"Cadre légal",q:"Le cyberharcèlement est-il un délit en France ?",opts:["Non, c'est uniquement civil", "Oui, jusqu'à 2 ans de prison et 30 000€", "Oui, mais seulement si la victime est mineure", "Non si ça se passe sur les réseaux sociaux"],correct:1,expl:"Le cyberharcèlement est un délit pénal (loi 2018). Si victime mineure : 3 ans et 45 000€. Les auteurs peuvent être anonymes et quand même retrouvés."},
  {theme:"Cadre légal",q:"Qu\'est-ce qu\'un programme de bug bounty ?",opts:["Un concours de piratage illégal", "Un programme officiel autorisant des chercheurs à tester la sécurité en échange d'une récompense", "Un logiciel de détection de bugs", "Une prime versée aux victimes de cyberattaques"],correct:1,expl:"Un bug bounty est un programme légal où une organisation invite des hackers éthiques à chercher des vulnérabilités en échange d\'une récompense. C\'est encadré et légal."},
  {theme:"Cadre légal",q:"Que signifie responsabilité pénale dans le piratage ?",opts:["Payer des dommages et intérêts", "Risquer une sanction pénale (amende, prison) prononcée par un tribunal", "Être renvoyé de son école", "Recevoir un avertissement"],correct:1,expl:"La responsabilité pénale signifie risquer une peine (amende, prison, TIG). Elle s\'applique dès 13 ans en France pour les infractions graves."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'un ransomware ?",opts:["Un logiciel espion", "Un logiciel qui chiffre tes fichiers et demande une rançon", "Un virus qui efface le disque dur", "Un logiciel de publicité intrusive"],correct:1,expl:"Un ransomware chiffre les fichiers de la victime et exige le paiement d\'une rançon pour la clé de déchiffrement. WannaCry (2017) a touché 300 000 ordinateurs dans 150 pays."},
  {theme:"Malwares",q:"Quel hôpital français a été victime d\'un ransomware majeur en 2022 ?",opts:["Hôpital de Paris", "Centre Hospitalier de Corbeil-Essonnes", "Hôpital de Lyon", "Clinique de Bordeaux"],correct:1,expl:"Le CH de Corbeil-Essonnes a été paralysé par Ragnar Locker en 2022. Les attaquants ont réclamé 10 millions de dollars. L\'hôpital a fonctionné en mode dégradé pendant des semaines."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'un cheval de Troie ?",opts:["Un virus qui se reproduit seul", "Un malware qui se cache dans un logiciel légitime en apparence", "Un logiciel espion gouvernemental", "Un ver informatique"],correct:1,expl:"Comme dans la mythologie, un Trojan se cache dans un logiciel apparemment utile. Une fois installé, il peut voler des données, ouvrir une backdoor ou télécharger d\'autres malwares."},
  {theme:"Malwares",q:"Que faire si tu es victime d\'un ransomware ?",opts:["Payer la rançon immédiatement", "Éteindre la machine, déconnecter du réseau, contacter un expert et signaler à l'ANSSI", "Reformater directement le disque", "Tenter de déchiffrer soi-même les fichiers"],correct:1,expl:"Ne jamais payer. Isoler la machine du réseau. Contacter un spécialiste et déclarer sur cybermalveillance.gouv.fr. Des outils de déchiffrement existent pour certains ransomwares."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'un ver informatique ?",opts:["Un malware qui a besoin d'un fichier hôte", "Un malware qui se propage seul sur le réseau sans action de l'utilisateur", "Un logiciel de surveillance parentale", "Un type de virus uniquement sur Mac"],correct:1,expl:"Un ver se propage de machine en machine de façon autonome en exploitant des failles réseau. Stuxnet (2010), ciblant les centrifugeuses iraniennes, est l\'exemple le plus célèbre."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'un spyware ?",opts:["Un logiciel qui affiche des publicités", "Un logiciel qui surveille tes activités et envoie les données à un tiers", "Un virus qui ralentit l'ordinateur", "Un ransomware discret"],correct:1,expl:"Un spyware surveille ton activité (frappes clavier, captures d\'écran) et envoie ces données à un attaquant. Il peut voler mots de passe, numéros de carte, données personnelles silencieusement."},
  {theme:"Malwares",q:"Comment un malware arrive-t-il le plus souvent sur un ordinateur ?",opts:["Via une faille WiFi automatique", "Par une pièce jointe ou un lien malveillant dans un email", "Via le bluetooth", "Par simple connexion à internet"],correct:1,expl:"La majorité des infections arrivent par email (pièce jointe .exe, .docm, lien malveillant) ou par téléchargement depuis des sources non officielles."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'un botnet ?",opts:["Un réseau de robots industriels connectés", "Un réseau d'ordinateurs infectés contrôlés à distance par un attaquant", "Un service de sécurité automatisé", "Un logiciel antivirus en réseau"],correct:1,expl:"Un botnet est un réseau de machines infectées contrôlées à distance. Utilisé pour du spam, des DDoS, du minage de cryptomonnaies. La victime ne sait souvent pas que sa machine est dans un botnet."},
  {theme:"Malwares",q:"Faut-il payer la rançon si on est victime d\'un ransomware ?",opts:["Oui, c'est la seule solution", "Non, jamais — ça encourage les criminels et rien ne garantit la récupération", "Oui si les données sont importantes", "Seulement si la rançon est inférieure à 1000€"],correct:1,expl:"L\'ANSSI recommande de ne jamais payer. Payer finance les criminels et dans 30% des cas les données ne sont pas récupérées même après paiement."},
  {theme:"Malwares",q:"Qu\'est-ce qu\'une backdoor ?",opts:["Une porte d'entrée physique sécurisée", "Un accès caché permettant de contrôler un système à distance", "Un protocole de sauvegarde", "Un type de pare-feu"],correct:1,expl:"Une backdoor est un accès caché dans un système laissé par un attaquant. Elle permet de revenir sur le système compromis sans repasser par l\'attaque initiale."},
  {theme:"WiFi & réseau",q:"Quel est le principal risque d\'un Wi-Fi public non chiffré ?",opts:["Le Wi-Fi est plus lent", "Un attaquant peut intercepter ton trafic (man-in-the-middle)", "La batterie se décharge plus vite", "Les sites web se chargent différemment"],correct:1,expl:"Sur un Wi-Fi public non chiffré, quelqu\'un sur le même réseau peut capturer ton trafic avec Wireshark. Sans HTTPS, il voit tout : identifiants, messages, données de formulaires."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce qu\'un Evil Twin ?",opts:["Un virus qui copie tes fichiers", "Un faux point d'accès Wi-Fi imitant un réseau légitime", "Un logiciel espion sur téléphone", "Un type d'attaque par email"],correct:1,expl:"Un Evil Twin est un faux point d\'accès qui imite un réseau légitime (même nom). Tu te connectes en croyant être sur le Wi-Fi du café, mais l\'attaquant intercepte tout ton trafic."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce qu\'un VPN ?",opts:["Un antivirus amélioré", "Un réseau privé virtuel qui chiffre ta connexion", "Un pare-feu personnel", "Un gestionnaire de mots de passe"],correct:1,expl:"Un VPN chiffre ton trafic et le fait transiter par un serveur distant. Sur un Wi-Fi public, même si quelqu\'un intercepte ton trafic, il ne voit que des données chiffrées."},
  {theme:"WiFi & réseau",q:"Ton téléphone se connecte automatiquement à Free WiFi. C\'est dangereux car...",opts:["La connexion sera lente", "N'importe qui peut créer un réseau avec ce nom pour piéger les appareils", "Les données mobiles se désactivent", "C'est illégal"],correct:1,expl:"Les appareils se connectent aux réseaux connus par leur nom. Un attaquant peut créer un faux réseau avec le même nom. Désactive la connexion automatique."},
  {theme:"WiFi & réseau",q:"Que signifie HTTPS dans une URL ?",opts:["Le site est officiel et certifié", "La connexion est chiffrée avec TLS/SSL", "Le site est rapide", "Le site est gratuit"],correct:1,expl:"HTTPS = HTTP + chiffrement TLS/SSL. Tes données en transit sont chiffrées. Mais HTTPS ne dit rien sur la légitimité du site lui-même."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce qu\'une attaque DDoS ?",opts:["Voler des données d'une entreprise", "Saturer un serveur avec des milliers de requêtes pour le rendre inaccessible", "Installer un ransomware sur un serveur", "Intercepter des communications chiffrées"],correct:1,expl:"Un DDoS inonde un serveur de requêtes depuis des milliers de machines jusqu\'à le faire tomber. Des sites comme GitHub ou des banques ont été victimes de DDoS."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce qu\'un pare-feu ?",opts:["Un antivirus", "Un système qui filtre le trafic réseau selon des règles", "Un logiciel de chiffrement", "Un VPN intégré"],correct:1,expl:"Un pare-feu analyse le trafic réseau et bloque ce qui ne correspond pas aux règles définies. C\'est une première ligne de défense essentielle."},
  {theme:"WiFi & réseau",q:"Quelle action protège le mieux sur un Wi-Fi public ?",opts:["Désactiver le bluetooth", "Utiliser uniquement des sites HTTPS et un VPN", "Éteindre la localisation", "Passer en mode avion et revenir"],correct:1,expl:"Sur Wi-Fi public : utiliser un VPN et s\'assurer que tous les sites sont en HTTPS. Éviter les services sensibles (banque, email pro) sur des réseaux publics."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce que le protocole WPA3 ?",opts:["Un type de pare-feu", "Le standard de chiffrement le plus récent pour les réseaux Wi-Fi", "Un protocole de messagerie sécurisée", "Un type de VPN"],correct:1,expl:"WPA3 est le standard de sécurité Wi-Fi actuel, remplaçant WPA2. Il offre un meilleur chiffrement et résiste aux attaques par dictionnaire sur les mots de passe Wi-Fi."},
  {theme:"WiFi & réseau",q:"Qu\'est-ce qu\'une adresse IP ?",opts:["Un identifiant physique de ta carte réseau", "Une adresse numérique qui identifie ton appareil sur un réseau", "Le nom de ton réseau Wi-Fi", "Un protocole de chiffrement"],correct:1,expl:"Une adresse IP identifie ton appareil sur un réseau. Elle peut révéler ta localisation approximative. Les sites que tu visites voient ton IP publique — d\'où l\'intérêt du VPN pour la masquer."},
  {theme:"Bonnes pratiques",q:"À quelle fréquence faut-il faire des mises à jour de sécurité ?",opts:["Une fois par an", "Le plus tôt possible après leur publication", "Seulement quand l'ordinateur ralentit", "Jamais, elles peuvent créer des bugs"],correct:1,expl:"Les mises à jour corrigent des failles connues. Les attaquants exploitent rapidement les systèmes non patchés. Activer les mises à jour automatiques est une bonne pratique."},
  {theme:"Bonnes pratiques",q:"Tu trouves une clé USB dans la rue. Que fais-tu ?",opts:["Tu la branches pour voir ce qu'il y a dedans", "Tu la rapportes à la police ou la jettes", "Tu la branches sur un ordinateur non connecté", "Tu la donnes à un ami"],correct:1,expl:"Une clé USB abandonnée peut contenir un malware qui s\'installe automatiquement. Des études montrent que 45% des gens branchent les clés USB trouvées. Ne jamais le faire."},
  {theme:"Bonnes pratiques",q:"Qu\'est-ce que la règle de sauvegarde 3-2-1 ?",opts:["3 sauvegardes, 2 par semaine, 1 par mois", "3 copies, sur 2 supports différents, dont 1 hors site", "3 disques durs, 2 NAS, 1 cloud", "Sauvegarder 3 fois, vérifier 2 fois, restaurer 1 fois"],correct:1,expl:"3 copies des données, sur 2 supports différents, dont 1 hors site. Si ransomware, incendie ou vol — tu as toujours tes données."},
  {theme:"Bonnes pratiques",q:"Que faire avant de vendre un ancien téléphone ?",opts:["Simplement supprimer les apps", "Faire une réinitialisation d'usine après sauvegarde", "Retirer la SIM uniquement", "Rien, le nouveau propriétaire ne pourra pas accéder aux données"],correct:1,expl:"Une simple suppression ne suffit pas — les données sont récupérables. Il faut une réinitialisation d\'usine complète (idéalement après avoir chiffré le téléphone)."},
  {theme:"Bonnes pratiques",q:"Qu\'est-ce que le principe du moindre privilège ?",opts:["Donner le minimum de droits nécessaires à chaque utilisateur", "Utiliser le compte admin uniquement en urgence", "Limiter les mises à jour aux fonctions essentielles", "Désactiver les fonctionnalités inutiles"],correct:0,expl:"Moindre privilège = ne donner que les droits strictement nécessaires. Un comptable n\'a pas besoin d\'accès au serveur de production. Si son compte est compromis, les dégâts sont limités."},
  {theme:"Bonnes pratiques",q:"Comment se protéger du phishing au quotidien ?",opts:["Installer un antivirus", "Vérifier l'expéditeur et ne jamais cliquer sur des liens urgents", "Éviter les sites adultes", "Faire des sauvegardes"],correct:1,expl:"Vérifier l\'adresse email exacte (pas juste le nom affiché), aller directement sur le site officiel, ne jamais entrer ses identifiants depuis un lien d\'email."},
  {theme:"Bonnes pratiques",q:"Que faire si tu remarques une activité bizarre sur ton compte en ligne ?",opts:["Attendre de voir si ça se reproduit", "Changer le mot de passe, activer le 2FA et vérifier les connexions récentes", "Supprimer le compte", "Contacter le service client uniquement"],correct:1,expl:"En cas d\'activité suspecte : changer le mot de passe en urgence, activer le 2FA, consulter l\'historique des connexions pour détecter les sessions inconnues."},
  {theme:"Bonnes pratiques",q:"Que fait concrètement un antivirus ?",opts:["Chiffre tes fichiers pour les protéger", "Détecte et supprime les malwares connus en comparant aux signatures", "Bloque toutes les connexions réseau suspectes", "Sauvegarde tes données automatiquement"],correct:1,expl:"Un antivirus compare les fichiers à une base de signatures de malwares connus. Il ne protège pas contre les malwares zero-day — d\'où l\'importance des mises à jour de ses bases."},
  {theme:"Bonnes pratiques",q:"Comment vérifier si tes données ont fuité ?",opts:["Tenter de te connecter avec tes anciens mots de passe", "Utiliser haveibeenpwned.com pour vérifier si ton email est dans des fuites connues", "Appeler ton opérateur", "Demander à la CNIL"],correct:1,expl:"HaveIBeenPwned recense les fuites de données connues. En entrant ton email, tu vois si tes credentials ont été exposés. Si oui : changer immédiatement le mot de passe."},
  {theme:"Bonnes pratiques",q:"Pourquoi faut-il verrouiller son ordinateur quand on s\'éloigne ?",opts:["Pour économiser la batterie", "Pour empêcher toute personne physiquement présente d'accéder à la session", "Pour protéger contre les virus", "Pour éviter les mises à jour intempestives"],correct:1,expl:"Un écran non verrouillé = accès total en quelques secondes. Raccourci : Windows+L sur Windows, Cmd+Ctrl+Q sur Mac. Prendre l\'habitude de le faire systématiquement."},
  {theme:"IA & Deepfakes",q:"Qu\'est-ce qu\'un deepfake ?",opts:["Un faux profil sur les réseaux sociaux", "Une vidéo ou audio falsifié par l'IA pour faire dire quelque chose à quelqu'un", "Un malware utilisant l'IA", "Un faux site web très convaincant"],correct:1,expl:"Un deepfake utilise l\'IA pour synthétiser des vidéos ou audios hyper-réalistes de personnes disant ou faisant des choses qu\'elles n\'ont jamais faites. La technologie s\'améliore très rapidement."},
  {theme:"IA & Deepfakes",q:"Comment détecter un deepfake vidéo ?",opts:["C'est impossible", "Clignements anormaux, artefacts sur les bords du visage, incohérences d'éclairage", "La qualité vidéo est toujours mauvaise", "La voix est toujours robotique"],correct:1,expl:"Indices : clignements peu naturels, bords du visage flous, incohérences de lumière, dents ou oreilles mal rendues. Mais les deepfakes progressent — vérifier toujours la source originale."},
  {theme:"IA & Deepfakes",q:"Un deepfake audio de ton patron te demande un virement urgent. C\'est quoi ?",opts:["Phishing classique", "Fraude au deepfake vocal (vishing IA)", "Ransomware", "Ingénierie sociale classique"],correct:1,expl:"Les arnaques par deepfake vocal se multiplient. En 2019, un PDG a transféré 220 000€ après avoir reçu un appel d\'une voix IA imitant son supérieur. Toujours vérifier par un autre canal."},
  {theme:"IA & Deepfakes",q:"L\'IA peut-elle être utilisée par les attaquants ?",opts:["Non, l'IA est uniquement défensive", "Oui : personnaliser les phishings, générer des deepfakes, automatiser les attaques", "Seulement pour créer des virus", "L'IA est trop complexe pour les cybercriminels"],correct:1,expl:"L\'IA est un outil double. Les attaquants l\'utilisent pour personnaliser les phishings, créer des deepfakes, générer du code malveillant. Les défenseurs l\'utilisent aussi pour détecter ces attaques."},
  {theme:"IA & Deepfakes",q:"Qu\'est-ce que le prompt injection dans les outils d\'IA ?",opts:["Un type de ransomware ciblant les IA", "Manipuler une IA via ses entrées pour lui faire ignorer ses instructions", "Un virus qui infecte les modèles d'IA", "Une technique de chiffrement"],correct:1,expl:"Le prompt injection injecte des instructions malveillantes dans les entrées d\'un système IA pour détourner son comportement. Par exemple : exfiltrer des données via un document analysé."},
  {theme:"IA & Deepfakes",q:"Comment l\'IA générative peut-elle améliorer le phishing ?",opts:["Elle ne peut pas", "Générer des millions d'emails personnalisés sans fautes en quelques secondes", "Uniquement pour créer de faux logos", "Pour envoyer des emails plus rapidement"],correct:1,expl:"L\'IA générative crée des emails de phishing personnalisés, grammaticalement parfaits, adaptés à la cible. La barrière des fautes d\'orthographe qui permettait de détecter le phishing disparaît."},
  {theme:"IA & Deepfakes",q:"Que sont les hallucinations d\'une IA ?",opts:["Des bugs visuels dans les deepfakes", "Des informations fausses présentées avec confiance par une IA", "Des virus créés par l'IA", "Des erreurs de traduction"],correct:1,expl:"Les hallucinations sont des affirmations fausses générées avec assurance par une IA. Une IA peut inventer des sources, citations, faits. Toujours vérifier les informations importantes."},
  {theme:"IA & Deepfakes",q:"Quelle loi européenne encadre l\'utilisation de l\'IA ?",opts:["Le RGPD uniquement", "L'AI Act (Règlement IA européen, 2024)", "La directive NIS 2", "Aucune loi n'existe encore"],correct:1,expl:"L\'AI Act (2024) est le premier cadre légal mondial sur l\'IA. Il classe les systèmes IA par niveau de risque et interdit certaines utilisations comme la reconnaissance faciale en temps réel."},
  {theme:"IA & Deepfakes",q:"Comment vérifier si une image est générée par IA ?",opts:["C'est impossible", "Vérifier les mains (souvent mal rendues), les arrière-plans, utiliser des outils de détection", "Regarder la résolution", "Vérifier les métadonnées EXIF uniquement"],correct:1,expl:"Indices : mains avec trop de doigts, texte illisible, oreilles asymétriques, arrière-plans étranges. Des outils comme AI or Not analysent les probabilités. Mais la détection reste imparfaite."},
  {theme:"IA & Deepfakes",q:"Un deepfake compromettant circule sur toi. Quelle est la première chose à faire ?",opts:["Ignorer, ça va passer", "Signaler sur la plateforme, contacter la police, conserver des preuves", "Le partager pour montrer que c'est faux", "Contacter directement l'auteur"],correct:1,expl:"Signaler immédiatement à la plateforme. Conserver des captures comme preuves. Porter plainte (c\'est un délit). Contacter cybermalveillance.gouv.fr pour un accompagnement."},

// ── STATE ──
let ably, channel;
let players = {};
let teamDefs = [];
let currentMod = 'quiz';
let quizQ = [...QUIZ];
let quizIdx = -1;
let quizPhase = 'lobby';
let quizAnswers = {};
let timerInterval = null;
let timerLeft = 15, timerDur = 15;
let currentQ = null;
let phishIdx = 0, phishAnswers = {};
let empreinteIdx = 0;
let ctfSubmissions = {};
let cyberIdx = 0;

function pub(event, data) {
  if (channel) channel.publish(event, data);
}

function initAbly() {
  ably = new Ably.Realtime({ key: ABLY_KEY });
  ably.connection.on('connected', () => {
    document.getElementById('conn-pill').textContent = '⬤ Connecté';
    document.getElementById('conn-pill').className = 'pill on';
    document.getElementById('room-pill').textContent = 'Room: ' + ROOM;
    generateQR();
    switchMod('quiz');
    toast('Connecté !');
  });
  ably.connection.on('disconnected', () => {
    document.getElementById('conn-pill').textContent = '⬤ Déconnecté';
    document.getElementById('conn-pill').className = 'pill off';
  });
  channel = ably.channels.get('cyberconf-' + ROOM);

  channel.subscribe('player:join', msg => {
    const {id, name, team} = msg.data;
    players[id] = {name, team:team||null, score:0, correct:0, answered:false};
    if (teamDefs.length === 0) autoInitTeams();
    pub('host:teams', { teams: getTeamPayload() });
    pub('host:state', { phase: quizPhase, teams: getTeamPayload(), mod: currentMod, timeLeft: timerLeft });
    updateRight();
    toast(name + ' a rejoint !');
  });
  channel.subscribe('player:leave', msg => { delete players[msg.data.id]; updateRight(); });

  channel.subscribe('player:answer', msg => {
    const {id, answer, timeRemaining, mod} = msg.data;
    if (!players[id]) return;
    if (mod === 'quiz') {
      if (quizAnswers[id] !== undefined) return;
      quizAnswers[id] = answer;
      players[id].answered = true;
      if (currentQ && answer === currentQ.correct) {
        const pts = Math.max(50, Math.round(500 * (timeRemaining / timerDur)));
        players[id].score += pts; players[id].correct++;
      }
      updateLiveQuiz();
    } else if (mod === 'phishing') {
      phishAnswers[id] = answer;
      updateLivePhish();
    } else if (mod === 'empreinte') {
      const {qIndex, val} = answer;
      if (!players[id].emp) players[id].emp = {};
      players[id].emp[qIndex] = val;
      updateLiveEmp();
    } else if (mod === 'ctf') {
      const {challengeId, text} = answer;
      if (!ctfSubmissions[challengeId]) ctfSubmissions[challengeId] = {};
      const ch = CTF.find(c => c.id === challengeId);
      const correct = ch && ch.check(text);
      ctfSubmissions[challengeId][id] = {text, correct, name: players[id].name};
      if (correct) { players[id].score += ch.pts; players[id].correct++; }
      pub('host:ctf_result', {playerId:id, challengeId, correct, pts: correct ? ch.pts : 0});
      updateLiveCTF();
    }
    updateRight();
  });
}

function autoInitTeams() {
  teamDefs = [0,1,2].map(i => ({
    name: document.getElementById('tn'+i).value.trim() || ('Équipe '+(i+1)),
    color: document.getElementById('tc'+i).value
  }));
}

function getTeamPayload() {
  return teamDefs.map(t => ({
    name:t.name, color:t.color,
    count: Object.values(players).filter(p=>p.team===t.name).length
  }));
}

// ── QR ──
function generateQR() {
  const url = window.location.href.replace('animateur.html','joueur.html') + '?room=' + ROOM;
  document.getElementById('qr-url').textContent = url;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload = () => new QRCode(document.getElementById('qr-container'), {text:url,width:140,height:140,colorDark:'#00ff88',colorLight:'#1a2030'});
  document.head.appendChild(s);
}
function copyUrl() { navigator.clipboard.writeText(document.getElementById('qr-url').textContent); toast('Lien copié !'); }

// ── TEAMS ──
function broadcastTeams() {
  autoInitTeams();
  pub('host:teams', { teams: getTeamPayload() });
  updateLiveTeams(); updateTeamSB();
  toast('Équipes envoyées !');
}
function updateLiveTeams() {
  const el = document.getElementById('live-teams');
  if (!teamDefs.length) { el.innerHTML=''; return; }
  el.innerHTML = teamDefs.map(t => {
    const m = Object.values(players).filter(p=>p.team===t.name);
    const ts = m.reduce((s,p)=>s+p.score,0);
    return '<div class="trow" style="border-left-color:'+t.color+'">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+t.color+';flex-shrink:0"><\/div>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:'+t.color+'">'+t.name+'<\/div>'
      +'<div style="font-size:10px;color:var(--muted)">'+m.length+' joueur(s) · '+m.map(p=>p.name).slice(0,3).join(', ')+'<\/div><\/div>'
      +'<div style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+t.color+'">'+ts+'<\/div><\/div>';
  }).join('');
}
function updateTeamSB() {
  const el = document.getElementById('team-sb');
  if (!teamDefs.length) { el.innerHTML='<div style="font-size:11px;color:var(--muted)">Envoie les équipes →<\/div>'; return; }
  const sorted = teamDefs.map(t=>{const m=Object.values(players).filter(p=>p.team===t.name);return{name:t.name,color:t.color,total:m.reduce((s,p)=>s+p.score,0),count:m.length};}).sort((a,b)=>b.total-a.total);
  const r=['🥇','🥈','🥉'];
  el.innerHTML = sorted.map((t,i)=>'<div class="trow" style="border-left-color:'+t.color+'"><span>'+r[i]+'<\/span><span style="font-size:12px;font-weight:700;color:'+t.color+';flex:1;margin:0 6px">'+t.name+'<\/span><span style="font-size:10px;color:var(--muted)">'+t.count+'👤<\/span><span style="font-family:var(--mono);font-size:13px;color:'+t.color+'">'+t.total+'<\/span><\/div>').join('');
}

// ── RIGHT PANEL ──
function updateRight() {
  updateTeamSB(); updateLiveTeams();
  const pl = document.getElementById('players-list');
  const list = Object.values(players);
  if (!list.length) { pl.innerHTML='<div style="font-size:11px;color:var(--muted)">En attente...<\/div>'; }
  else pl.innerHTML = list.map(p=>{const t=p.team?teamDefs.find(x=>x.name===p.team):null;return '<div class="prow"><div class="pdot" style="background:'+(p.answered?'var(--green)':'var(--muted)')+'"><\/div><div style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name+'<\/div>'+(t?'<div style="font-size:10px;font-family:var(--mono);color:'+t.color+'">'+t.name+'<\/div>':'')+'<div style="font-family:var(--mono);font-size:11px;font-weight:700;color:'+(t?t.color:'var(--green)')+'">'+p.score+'<\/div><\/div>';}).join('');
  const sb = document.getElementById('indiv-sb');
  const sorted = [...list].sort((a,b)=>b.score-a.score).slice(0,10);
  if (!sorted.length) { sb.innerHTML='<div style="font-size:11px;color:var(--muted)">Aucun score<\/div>'; return; }
  const r=['🥇','🥈','🥉'];
  sb.innerHTML = sorted.map((p,i)=>{const t=p.team?teamDefs.find(x=>x.name===p.team):null;return '<div class="srow"><div class="sr-rank">'+(r[i]||'#'+(i+1))+'<\/div><div class="sr-name" style="'+(t?'color:'+t.color:'')+'">'+p.name+'<\/div><div class="sr-pts" style="'+(t?'color:'+t.color:'')+'">'+p.score+'<\/div><\/div>';}).join('');
  document.getElementById('pcount').textContent = list.length + ' joueurs';
}

// ── MOD SWITCH ──
function switchMod(mod) {
  currentMod = mod;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('nb-'+mod).classList.add('act');
  document.getElementById('phase-pill').textContent = mod;
  if (channel) pub('host:mod_change', { mod });
  document.getElementById('live-answers').innerHTML = '<div style="font-size:11px;color:var(--muted)">—<\/div>';
  if (mod==='quiz') renderQuizCenter();
  else if (mod==='phishing') renderPhishCenter();
  else if (mod==='empreinte') renderEmpCenter();
  else if (mod==='ctf') renderCTFCenter();
  else if (mod==='password') renderPwCenter();
  else if (mod==='cyber') renderCyberCenter();
}

function applyTheme() {
  const t = document.getElementById('theme-sel').value;
  quizQ = t ? QUIZ.filter(q=>q.theme===t) : [...QUIZ];
  quizQ = [...quizQ].sort(()=>Math.random()-.5);

}

function startQuiz() {
  quizQ=[...quizQ].sort(()=>Math.random()-.5);
  quizIdx=-1; quizPhase='question';
  Object.keys(players).forEach(id=>{players[id].score=0;players[id].correct=0;});
  nextQ();
}
function nextQ() {
  quizIdx++;
  if (quizIdx>=quizQ.length) { showPodium(); return; }
  currentQ=quizQ[quizIdx]; quizAnswers={};
  quizPhase='question';
  timerDur=parseInt(document.getElementById('timer-sel').value)||15;
  timerLeft=timerDur;
  Object.keys(players).forEach(id=>players[id].answered=false);
  pub('host:question',{index:quizIdx,total:quizQ.length,question:{q:currentQ.q,opts:currentQ.opts,theme:currentQ.theme},timerDuration:timerDur,mod:'quiz'});
  startTimer(); renderQuizCenter();
  document.getElementById('phase-pill').textContent='Q'+(quizIdx+1)+'/'+quizQ.length;
}
function startTimer() {
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerLeft--;
    pub('host:tick',{timeLeft:timerLeft});
    const n=document.getElementById('tnum'),f=document.getElementById('tfill');
    if(n){const pct=timerLeft/timerDur*100,tc=pct>50?'var(--green)':pct>25?'var(--amber)':'var(--red)';n.textContent=timerLeft;n.style.color=tc;if(f){f.style.width=pct+'%';f.style.background=tc;}}
    if(timerLeft<=0) revealQuiz();
  },1000);
}
function revealQuiz() {
  if(quizPhase!=='question') return;
  clearInterval(timerInterval); quizPhase='reveal';
  pub('host:reveal',{correct:currentQ.correct,correctText:currentQ.opts[currentQ.correct],expl:currentQ.expl,mod:'quiz',scores:Object.fromEntries(Object.entries(players).map(([id,p])=>[id,{score:p.score,correct:p.correct}]))});
  renderQuizCenter(); updateRight();
}
function showPodium() {
  clearInterval(timerInterval); quizPhase='podium';
  const sorted=Object.values(players).sort((a,b)=>b.score-a.score);
  const ts=teamDefs.map(t=>{const m=Object.values(players).filter(p=>p.team===t.name);return{name:t.name,color:t.color,total:m.reduce((s,p)=>s+p.score,0)};}).sort((a,b)=>b.total-a.total);
  pub('host:podium',{scores:sorted.map(p=>({name:p.name,score:p.score,correct:p.correct,team:p.team||null})),teams:ts,mod:'quiz'});
  renderQuizCenter(); updateRight();
  document.getElementById('phase-pill').textContent='podium';
}
function resetQuiz() {
  clearInterval(timerInterval); quizPhase='lobby'; quizIdx=-1; currentQ=null; quizAnswers={};
  Object.keys(players).forEach(id=>{players[id].score=0;players[id].correct=0;});
  pub('host:reset',{mod:'quiz'}); renderQuizCenter(); updateRight();
  document.getElementById('phase-pill').textContent='lobby';
}
function updateLiveQuiz() {
  if(!currentQ) return;
  const colors=['#e21b3c','#1368ce','#d89e00','#26890c'];
  const total=Math.max(1,Object.keys(players).length);
  const counts=[0,0,0,0];
  Object.values(quizAnswers).forEach(a=>{if(a>=0&&a<4)counts[a]++;});
  document.getElementById('live-answers').innerHTML=currentQ.opts.map((o,i)=>{
    const pct=Math.round(counts[i]/total*100);
    return '<div class="abar-row"><div class="abar-lbl" style="color:'+colors[i]+'">'+(i+1)+'<\/div><div class="abar-track"><div class="abar-fill" style="width:'+pct+'%;background:'+colors[i]+'">'+(pct>15?pct+'%':'')+'<\/div><\/div><div class="abar-n">'+counts[i]+'<\/div><\/div>';
  }).join('');
}

function sendCTF(id) {
  const ch=CTF.find(c=>c.id===id); if(!ch) return;
  ctfSubmissions[id]={};
  pub('host:ctf',{challengeId:id,tag:ch.tag,title:ch.title,desc:ch.desc,code:ch.code,hint:ch.hint,pts:ch.pts});
  toast('Challenge envoyé !');
}
function updateLiveCTF() {
  CTF.forEach(ch=>{
    const subs=ctfSubmissions[ch.id]||{};
    const el=document.getElementById('ctf-sub-'+ch.id);
    const rel=document.getElementById('ctf-res-'+ch.id);
    if(el) el.textContent=Object.keys(subs).length+' soumission(s)';
    if(rel) rel.innerHTML=Object.values(subs).filter(s=>s.correct).map(s=>'<div style="font-size:11px;color:var(--green);font-family:var(--mono)">✓ '+s.name+'<\/div>').join('');
  });
  const all=Object.entries(ctfSubmissions).flatMap(([id,subs])=>Object.values(subs));
  document.getElementById('live-answers').innerHTML='<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">'+all.filter(s=>s.correct).length+' ✓ correct(s) · '+all.filter(s=>!s.correct).length+' ✗<\/div>'+all.filter(s=>s.correct).slice(-5).map(s=>'<div style="font-size:11px;color:var(--green);padding:3px 0">✓ '+s.name+'<\/div>').join('');
}

// ══ PASSWORD ══
function renderPwCenter() {
  const c=document.getElementById('center');
  c.innerHTML='<div class="card">'
    +'<div style="font-size:20px;font-weight:800;margin-bottom:8px">🔑 Password Checker — Démo live<\/div>'
    +'<div style="font-size:13px;color:var(--muted);margin-bottom:16px">Mode animateur uniquement. Demande des suggestions à la salle !<\/div>'
    +'<input type="text" id="pw-inp" placeholder="Tape un mot de passe..." style="font-size:20px;font-family:var(--mono);padding:14px;margin-bottom:10px" oninput="checkPw(this.value)" autocomplete="off" spellcheck="false">'
    +'<div style="height:6px;background:var(--bg4);border-radius:3px;margin-bottom:12px;overflow:hidden"><div id="pw-bar" style="height:100%;border-radius:3px;transition:all .3s"><\/div><\/div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">FORCE<\/div><div id="pw-force" style="font-size:18px;font-weight:700;font-family:var(--mono)">—<\/div><\/div>'
    +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">TEMPS CRACKAGE<\/div><div id="pw-time" style="font-size:13px;font-weight:700;font-family:var(--mono);margin-top:4px">—<\/div><\/div>'
    +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">LONGUEUR<\/div><div id="pw-len" style="font-size:18px;font-weight:700;font-family:var(--mono)">0<\/div><\/div>'
    +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px"><div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:4px">ENTROPIE (bits)<\/div><div id="pw-ent" style="font-size:18px;font-weight:700;font-family:var(--mono)">0<\/div><\/div>'
    +'<\/div>'
    +'<div id="pw-tips" style="font-size:13px;color:var(--muted);line-height:1.7">Tape un mot de passe pour analyser.<\/div><\/div>';
}
function checkPw(pw) {
  const len=pw.length; document.getElementById('pw-len').textContent=len;
  if(!len){['pw-force','pw-time','pw-ent'].forEach(id=>document.getElementById(id).textContent='—');document.getElementById('pw-bar').style.width='0';document.getElementById('pw-tips').textContent='Tape un mot de passe pour analyser.';return;}
  let cs=0;if(/[a-z]/.test(pw))cs+=26;if(/[A-Z]/.test(pw))cs+=26;if(/[0-9]/.test(pw))cs+=10;if(/[^a-zA-Z0-9]/.test(pw))cs+=32;
  const ent=Math.round(len*Math.log2(cs||1)); document.getElementById('pw-ent').textContent=ent;
  const common=['azerty','password','123456','qwerty','azerty123','password123','admin','letmein'];
  const isCommon=common.some(c=>pw.toLowerCase().includes(c));
  let s=0;if(len>=8)s++;if(len>=12)s++;if(len>=16)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;if(isCommon)s=Math.max(0,s-3);
  const lvls=[{l:'Très faible',c:'#ff4455',p:8,t:'Instantané'},{l:'Faible',c:'#ff7744',p:22,t:'Quelques secondes'},{l:'Moyen',c:'#ffaa00',p:45,t:'Quelques heures'},{l:'Fort',c:'#44cc88',p:72,t:'Plusieurs années'},{l:'Très fort',c:'#00ff88',p:100,t:'> 1 milliard d\'années'}];
  const lv=lvls[s>5?4:s>3?3:s>2?2:s>1?1:0];
  const fe=document.getElementById('pw-force');fe.textContent=lv.l;fe.style.color=lv.c;
  document.getElementById('pw-time').textContent=lv.t;
  const bar=document.getElementById('pw-bar');bar.style.width=lv.p+'%';bar.style.background=lv.c;
  let tips=[];
  if(len<12)tips.push('→ Allonge le mot de passe (12+ caractères)');
  if(!/[A-Z]/.test(pw))tips.push('→ Ajoute des majuscules');
  if(!/[0-9]/.test(pw))tips.push('→ Ajoute des chiffres');
  if(!/[^a-zA-Z0-9]/.test(pw))tips.push('→ Ajoute des symboles');
  if(isCommon)tips.push('⚠ Trop courant — dans les listes de hackers !');
  if(s>=5)tips=['✓ Excellent ! Utilise Bitwarden pour stocker des mots de passe uniques.'];
  document.getElementById('pw-tips').innerHTML=tips.join('<br>')||'✓ Très bon !';
}

    +'<div style="font-size:13px;padding:8px;background:rgba(255,68,85,.07);border-radius:6px;border:1px solid rgba(255,68,85,.2);color:#ff9999;margin-bottom:12px">⚖️ '+s.sanctions+'<\/div>'

    +s.queFaire.map(q=>'<div style="font-size:13px;display:flex;gap:8px;margin-bottom:4px"><span style="color:var(--green)">→<\/span>'+q+'<\/div>').join('')

    +'<button class="btn bo bsm" onclick="cyberIdx=Math.max(0,cyberIdx-1);renderCyberScenario()" '+(cyberIdx===0?'disabled':'')+'>← Préc<\/button>'
    +'<button class="btn bg bsm" onclick="cyberIdx=Math.min(CYBER_SCENARIOS.length-1,cyberIdx+1);renderCyberScenario()" '+(cyberIdx===CYBER_SCENARIOS.length-1?'disabled':'')+'>Suiv →<\/button>'
    +'<\/div><\/div>';
}

// ── TOAST ──
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
