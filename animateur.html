<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Conf — Animateur</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00ff88;--red:#ff4455;--amber:#ffaa00;--blue:#4af;--bg:#0a0e14;--bg2:#111620;--bg3:#1a2030;--bg4:#222b3a;--border:rgba(0,255,136,0.12);--border2:rgba(0,255,136,0.28);--text:#e8edf5;--muted:#6b7a8d;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px}
.logo{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:1px}
.pill{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid}
.pill.on{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}
.pill.off{border-color:var(--red);color:var(--red);background:rgba(255,68,85,.08)}
.pill.am{border-color:var(--amber);color:var(--amber);background:rgba(255,170,0,.08)}
.ml{margin-left:auto}
.main{display:grid;grid-template-columns:240px 1fr 270px;overflow:hidden;height:100%}
.panel{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:14px}
.pr{border-right:none;border-left:1px solid var(--border)}
.pt{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;padding-top:12px;border-top:1px solid var(--border)}
.pt.first{margin-top:0;padding-top:0;border-top:none}
.nb{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);border:1px solid transparent;background:none;width:100%;text-align:left;font-family:var(--sans);transition:all .15s;margin-bottom:3px}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.act{background:var(--bg3);color:var(--green);border-color:var(--border)}
.nb .ic{width:18px;text-align:center;flex-shrink:0}
.center{overflow-y:auto;padding:20px;background:var(--bg)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.btn{padding:9px 18px;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s}
.bg{background:var(--green);color:#000;border-color:var(--green)}.bg:hover{opacity:.85}
.bo{background:none;color:var(--text);border-color:var(--border2)}.bo:hover{background:var(--bg3)}
.bsm{padding:5px 11px;font-size:11px}
.btn:disabled{opacity:.35;cursor:not-allowed}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:12px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--border2)}
.flex{display:flex;gap:8px;align-items:center}
.sl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.div{height:1px;background:var(--border);margin:10px 0}
.srow{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;background:var(--bg3);margin-bottom:5px}
.sr-rank{font-family:var(--mono);font-size:11px;color:var(--muted);width:18px}
.sr-name{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-pts{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)}
.tbar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:14px}
.tfill{height:100%;border-radius:4px;transition:width 1s linear,background .5s}
.abar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.abar-lbl{width:22px;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.abar-track{flex:1;height:26px;background:var(--bg4);border-radius:5px;overflow:hidden}
.abar-fill{height:100%;border-radius:5px;transition:width .4s;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#000}
.abar-n{font-family:var(--mono);font-size:11px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.prow{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;background:var(--bg3);margin-bottom:4px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.trow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;background:var(--bg3);margin-bottom:5px;border-left:3px solid transparent}
.qr-box{text-align:center;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);margin-bottom:10px}
.qr-url{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;word-break:break-all}
.pdots{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.pd{height:4px;flex:1;min-width:4px;border-radius:2px;background:var(--bg4)}
.pd.done{background:var(--green)}.pd.cur{background:var(--amber)}
.toast{position:fixed;bottom:14px;right:14px;background:var(--bg2);border:1px solid var(--green);border-radius:7px;padding:8px 14px;font-size:11px;font-family:var(--mono);color:var(--green);z-index:99;opacity:0;transform:translateY(16px);transition:all .25s}
.toast.show{opacity:1;transform:translateY(0)}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.opt-box{padding:11px 14px;border-radius:7px;border:1px solid var(--border);font-size:13px;margin-bottom:8px;background:var(--bg3)}
.opt-num{font-family:var(--mono);font-weight:700;margin-right:8px;color:var(--amber)}
.cpick{width:34px;height:30px;border:none;border-radius:5px;cursor:pointer;padding:2px;background:var(--bg4);flex-shrink:0}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="app">
  <div class="topbar">
    <div class="logo">CYBER_CONF<span class="blink">_</span> ANIMATEUR</div>
    <div class="pill off" id="conn-pill">⬤ Connexion...</div>
    <div class="pill am" id="room-pill">Room: —</div>
    <div id="pcount" style="font-family:var(--mono);font-size:11px;color:var(--muted)">0 joueurs</div>
    <div class="ml flex"><div class="pill am" id="phase-pill">lobby</div></div>
  </div>
  <div class="main">
    <!-- LEFT -->
    <div class="panel">
      <div class="pt first">Modules</div>
      <button class="nb act" id="nb-quiz" onclick="switchMod('quiz')"><span class="ic">❓</span>Quiz / Kahoot</button>
      <button class="nb" id="nb-phishing" onclick="switchMod('phishing')"><span class="ic">🎣</span>Phishing / Vrai-Fake</button>
      <button class="nb" id="nb-empreinte" onclick="switchMod('empreinte')"><span class="ic">👣</span>Empreinte Numérique</button>
      <button class="nb" id="nb-ctf" onclick="switchMod('ctf')"><span class="ic">🚩</span>CTF Initiation</button>
      <button class="nb" id="nb-password" onclick="switchMod('password')"><span class="ic">🔑</span>Password (démo)</button>
      <button class="nb" id="nb-cyber" onclick="switchMod('cyber')"><span class="ic">💬</span>Cyberharcèlement</button>

      <div class="pt">Équipes</div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc0" value="#ff4455"><input type="text" id="tn0" value="Équipe Rouge"></div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc1" value="#4488ff"><input type="text" id="tn1" value="Équipe Bleue"></div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px"><input type="color" class="cpick" id="tc2" value="#00ff88"><input type="text" id="tn2" value="Équipe Verte"></div>
      <button class="btn bg bsm" style="width:100%;margin-top:4px" onclick="broadcastTeams()">📡 Envoyer aux joueurs</button>
      <div id="live-teams" style="margin-top:8px"></div>

      <div class="pt">Quiz — options</div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px">
        <label style="font-size:11px;color:var(--muted);width:50px;flex-shrink:0">Thème</label>
        <select id="theme-sel" onchange="applyTheme()" style="font-size:11px">
          <option value="">Tous</option>
          <option value="Mots de passe">🔑 Mots de passe</option>
          <option value="Phishing">🎣 Phishing</option>
          <option value="Réseaux sociaux">📱 Réseaux sociaux</option>
          <option value="Cadre légal">⚖️ Cadre légal</option>
          <option value="Malwares">🦠 Malwares</option>
          <option value="WiFi & réseau">📡 WiFi & réseau</option>
          <option value="Bonnes pratiques">✅ Pratiques</option>
          <option value="IA & Deepfakes">🤖 IA & Deepfakes</option>
          <option value="Métiers cyber">💼 Métiers</option>
          <option value="Culture cyber">🌐 Culture</option>
          <option value="Cyberharcèlement">💬 Cyberharcèlement</option>
        </select>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <label style="font-size:11px;color:var(--muted);width:50px;flex-shrink:0">Timer</label>
        <select id="timer-sel" style="font-size:11px">
          <option value="10">10s</option><option value="15" selected>15s</option>
          <option value="20">20s</option><option value="30">30s</option>
        </select>
      </div>

      <div class="pt">Rejoindre</div>
      <div class="qr-box"><div id="qr-container"></div><div class="qr-url" id="qr-url">En attente de connexion...</div></div>
      <button class="btn bo bsm" style="width:100%" onclick="copyUrl()">📋 Copier le lien</button>
    </div>

    <!-- CENTER -->
    <div class="center" id="center">
      <div style="text-align:center;padding:60px;color:var(--muted)">
        <div style="font-size:36px;margin-bottom:12px">⚡</div>
        <div style="font-family:var(--mono);font-size:13px">Connexion en cours...</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="panel pr">
      <div class="pt first">Classement équipes</div>
      <div id="team-sb"><div style="font-size:11px;color:var(--muted)">Envoie les équipes →</div></div>
      <div class="pt">Joueurs connectés</div>
      <div id="players-list"><div style="font-size:11px;color:var(--muted)">En attente...</div></div>
      <div class="pt">Réponses en direct</div>
      <div id="live-answers"><div style="font-size:11px;color:var(--muted)">—</div></div>
      <div class="pt">Scores individuels</div>
      <div id="indiv-sb"><div style="font-size:11px;color:var(--muted)">Aucun score</div></div>
    </div>
  </div>
</div>

<script>
const ABLY_KEY = 'evrpcQ.X7n3VQ:x9AMe7ScSb_lWITGg7KHRUTka7B9ltfMGB0tTiULt9w';
const ROOM = Math.random().toString(36).substr(2,6).toUpperCase();

const QUIZ = [
  {theme:"Mots de passe",q:"Longueur minimale recommandée pour un mot de passe sécurisé ?",opts:["6 caractères","8 caractères","12 caractères","20 caractères"],correct:2,expl:"12 caractères minimum. En dessous, cracké en quelques heures."},
  {theme:"Mots de passe",q:"Que signifie 2FA ?",opts:["Two Factor Application","Two Factor Authentication","Two Firewall Access","Two File Archive"],correct:1,expl:"Authentification à deux facteurs : mot de passe + téléphone ou clé physique."},
  {theme:"Mots de passe",q:"Méthode 2FA la plus sécurisée ?",opts:["SMS","Email","Application TOTP","Question secrète"],correct:2,expl:"TOTP génère des codes localement. SMS vulnérable au SIM swapping."},
  {theme:"Mots de passe",q:"Une attaque brute force c'est quoi ?",opts:["Voler physiquement l'ordi","Tester toutes les combinaisons automatiquement","Deviner par ingénierie sociale","Intercepter sur le réseau"],correct:1,expl:"Teste automatiquement toutes les combinaisons. D'où l'importance de la longueur."},
  {theme:"Phishing",q:"Pourcentage des cyberattaques commençant par du phishing ?",opts:["Environ 30%","Environ 50%","Plus de 80%","Moins de 20%"],correct:2,expl:"Plus de 80%. Tromper un humain est souvent plus simple que casser un système."},
  {theme:"Phishing",q:"Qu'est-ce que le spear phishing ?",opts:["Phishing de masse","Phishing personnalisé ciblant une personne précise","Phishing par SMS","Phishing via faux sites"],correct:1,expl:"Ciblé : l'attaquant se renseigne sur la victime pour un message ultra-crédible."},
  {theme:"Phishing",q:"HTTPS garantit que...",opts:["Le site est légitime","Connexion chiffrée mais le site peut être frauduleux","Site certifié gouvernement","Aucune donnée volée"],correct:1,expl:"HTTPS chiffre la connexion, mais ne garantit PAS la légitimité du site."},
  {theme:"Phishing",q:"Qu'est-ce que le smishing ?",opts:["Phishing par email","Phishing par SMS","Phishing par appel téléphonique","Phishing par courrier"],correct:1,expl:"SMS + phishing. Faux livreur, fausse banque ou faux gouvernement."},
  {theme:"Réseaux sociaux",q:"Qu'est-ce que l'empreinte numérique ?",opts:["Scanner d'empreinte digitale","Traces laissées par ton activité en ligne","Profil sur les réseaux sociaux","Historique de navigation"],correct:1,expl:"Tout : historique, posts, likes, localisation, achats... profil très précis."},
  {theme:"Réseaux sociaux",q:"Qu'est-ce que le doxing ?",opts:["Publier des documents d'entreprise","Collecter et publier infos perso sans consentement","Pirater un compte","Supprimer ses données"],correct:1,expl:"Publier infos personnelles pour nuire. Illégal en France."},
  {theme:"Réseaux sociaux",q:"Danger de publier sa localisation en temps réel ?",opts:["Aucun si compte privé","Révèle ton absence et permet de te localiser physiquement","Seulement du spam","Uniquement si compte public"],correct:1,expl:"Cambriolage, stalking, agression. Même en compte privé, les amis peuvent partager."},
  {theme:"Réseaux sociaux",q:"Qu'est-ce que l'OSINT ?",opts:["Type de ransomware","Collecte d'infos depuis sources publiques","Protocole de chiffrement","Type d'antivirus"],correct:1,expl:"Open Source Intelligence. Réseaux sociaux, sites web, registres publics..."},
  {theme:"Cadre légal",q:"Loi française contre l'accès non autorisé à un système ?",opts:["Loi Informatique et Libertés","Loi Godfrain (1988)","RGPD","Loi HADOPI"],correct:1,expl:"Loi Godfrain 1988 : jusqu'à 2 ans de prison et 60 000€ d'amende, même sans modification."},
  {theme:"Cadre légal",q:"RGPD = ?",opts:["Règlement Général sur la Protection des Données","Réseau Global Protection Digitale","Règlement Gestion Programmes Dangereux","Registre Général Personnes Danger"],correct:0,expl:"Règlement européen 2018 sur la protection des données personnelles."},
  {theme:"Cadre légal",q:"Un mineur de 15 ans pirate son école. Il risque quoi ?",opts:["Rien, il est mineur","Simple avertissement scolaire","Poursuites pénales adaptées aux mineurs","Amende de ses parents seulement"],correct:2,expl:"La minorité n'exonère pas de responsabilité pénale. Tribunal pour enfants possible."},
  {theme:"Cadre légal",q:"Que protège principalement la directive NIS 2 ?",opts:["Données personnelles citoyens","Cybersécurité des secteurs critiques (hôpitaux, énergie...)","Droits d'auteur sur internet","Liberté d'expression en ligne"],correct:1,expl:"NIS 2 impose des obligations de cybersécurité aux opérateurs de secteurs essentiels."},
  {theme:"Malwares",q:"Qu'est-ce qu'un ransomware ?",opts:["Logiciel espion","Chiffre tes fichiers et demande une rançon","Virus qui efface le disque dur","Logiciel de publicité intrusive"],correct:1,expl:"Chiffre les fichiers et exige une rançon. WannaCry : 300 000 machines en 2017."},
  {theme:"Malwares",q:"Faut-il payer la rançon suite à un ransomware ?",opts:["Oui, seule solution","Non, jamais — finance les criminels","Oui si les données sont importantes","Seulement si montant faible"],correct:1,expl:"ANSSI : ne jamais payer. Dans 30% des cas, données non récupérées même après paiement."},
  {theme:"Malwares",q:"Qu'est-ce qu'un cheval de Troie ?",opts:["Virus qui se reproduit seul","Malware caché dans un logiciel légitime en apparence","Logiciel espion","Ver informatique"],correct:1,expl:"Se cache dans un logiciel utile. Une fois installé, ouvre une backdoor ou vole des données."},
  {theme:"Malwares",q:"Qu'est-ce qu'un botnet ?",opts:["Réseau de robots industriels","Réseau d'ordinateurs infectés contrôlés à distance","Service de sécurité automatisé","Antivirus en réseau"],correct:1,expl:"Machines infectées contrôlées à distance. Utilisé pour DDoS, spam, minage de crypto."},
  {theme:"WiFi & réseau",q:"Principal risque d'un Wi-Fi public non chiffré ?",opts:["Wi-Fi plus lent","Interception du trafic (man-in-the-middle)","Batterie qui se décharge","Sites qui chargent différemment"],correct:1,expl:"Quelqu'un sur le même réseau peut capturer tout ton trafic avec Wireshark."},
  {theme:"WiFi & réseau",q:"Qu'est-ce qu'un VPN ?",opts:["Antivirus amélioré","Réseau privé virtuel qui chiffre ta connexion","Pare-feu personnel","Gestionnaire de mots de passe"],correct:1,expl:"Chiffre ton trafic. Sur Wi-Fi public, l'attaquant ne voit que données chiffrées."},
  {theme:"WiFi & réseau",q:"Qu'est-ce qu'un Evil Twin ?",opts:["Virus qui copie tes fichiers","Faux point d'accès Wi-Fi imitant un réseau légitime","Logiciel espion sur téléphone","Type d'attaque email"],correct:1,expl:"Faux Wi-Fi avec le même nom. Tu te connectes et l'attaquant intercepte tout ton trafic."},
  {theme:"WiFi & réseau",q:"Protocole de sécurité Wi-Fi le plus récent ?",opts:["WEP","WPA","WPA2","WPA3"],correct:3,expl:"WPA3 est le standard actuel. Il résiste mieux aux attaques par dictionnaire sur les mots de passe Wi-Fi."},
  {theme:"Bonnes pratiques",q:"Tu trouves une clé USB dans la rue. Tu fais quoi ?",opts:["Tu la branches pour voir","Tu la rapportes à la police ou la jettes","Tu la branches sur un PC non connecté","Tu la donnes à un ami"],correct:1,expl:"Peut contenir un malware qui s'installe automatiquement à la connexion. Ne jamais brancher."},
  {theme:"Bonnes pratiques",q:"Règle de sauvegarde 3-2-1 ?",opts:["3 sauvegardes par semaine","3 copies, 2 supports différents, 1 hors site","3 disques, 2 NAS, 1 cloud","Sauvegarder 3 fois, vérifier 2 fois"],correct:1,expl:"Protection contre ransomware, vol ou incendie. La copie hors site est essentielle."},
  {theme:"Bonnes pratiques",q:"Comment vérifier si tes données ont fuité ?",opts:["Tenter de se connecter avec anciens mots de passe","Utiliser haveibeenpwned.com","Appeler son opérateur","Demander à la CNIL"],correct:1,expl:"HaveIBeenPwned recense les fuites connues. Si ton email y est, change immédiatement le mot de passe."},
  {theme:"IA & Deepfakes",q:"Qu'est-ce qu'un deepfake ?",opts:["Faux profil sur les réseaux","Vidéo ou audio falsifié par l'IA","Malware utilisant l'IA","Faux site web très convaincant"],correct:1,expl:"L'IA synthétise des vidéos/audios hyper-réalistes de personnes disant des choses fausses."},
  {theme:"IA & Deepfakes",q:"Comment détecter un deepfake vidéo ?",opts:["C'est impossible","Clignements anormaux, artefacts sur les bords, incohérences éclairage","Qualité toujours mauvaise","La voix est robotique"],correct:1,expl:"Indices : clignements peu naturels, bords du visage flous, incohérences de lumière."},
  {theme:"Métiers cyber",q:"White hat vs black hat ?",opts:["Couleur de leur équipement","White hat = éthique et légal, black hat = malveillant et illégal","White hat = débutant","White hat = défensif uniquement"],correct:1,expl:"White hat : hacker éthique avec autorisation. Black hat : cybercriminel agissant illégalement."},
  {theme:"Métiers cyber",q:"Qu'est-ce qu'un pentest ?",opts:["Test de vitesse réseau","Simulation d'attaque autorisée pour trouver des failles","Audit de conformité RGPD","Test de résistance des serveurs"],correct:1,expl:"Attaque simulée et autorisée pour identifier les vulnérabilités avant les vrais attaquants."},
  {theme:"Métiers cyber",q:"Que fait un analyste SOC ?",opts:["Développe des logiciels de sécurité","Surveille en temps réel et répond aux incidents","Vend des solutions de cybersécurité","Gère les mises à jour antivirus"],correct:1,expl:"Security Operations Center : surveille les alertes 24h/24 et répond aux incidents."},
  {theme:"Culture cyber",q:"WannaCry c'est quoi ?",opts:["Logiciel espion","Ransomware 2017 — 300 000 machines dans 150 pays","Cheval de Troie bancaire","Virus qui efface les disques"],correct:1,expl:"Exploitait une faille Windows volée à la NSA. Estimé à 4 milliards de dégâts."},
  {theme:"Culture cyber",q:"Qu'est-ce qu'un zero-day ?",opts:["Attaque lancée à minuit","Faille inconnue du fabricant sans patch disponible","Virus créé en une journée","Attaque impossible à contrer"],correct:1,expl:"Faille inconnue du fabricant. Zéro jour de retard pour l'attaquant. Valeur énorme sur le marché noir."},
  {theme:"Culture cyber",q:"Qu'est-ce que le dark web ?",opts:["Internet la nuit","Partie d'internet accessible via Tor, non indexée","Réseau uniquement criminel","Données supprimées d'internet"],correct:1,expl:"Accessible via Tor qui anonymise les connexions. Pas uniquement criminel mais aussi utilisé pour la vie privée."},
  {theme:"Cyberharcèlement",q:"Que signifie le 3018 ?",opts:["Urgences médicales","Numéro national contre le cyberharcèlement","Signalement contenu illégal","Police nationale"],correct:1,expl:"3018 : gratuit, anonyme, 7j/7 9h-23h. Pour victimes, parents et professionnels."},
  {theme:"Cyberharcèlement",q:"Le cyberharcèlement est un délit en France ?",opts:["Non, uniquement civil","Oui, jusqu'à 2 ans de prison et 30 000€","Oui mais seulement si victime mineure","Non si sur les réseaux sociaux"],correct:1,expl:"Délit pénal loi 2018. Si victime mineure : 3 ans et 45 000€."},

// ── STATE ──
let ably, channel;
let players = {};
let teamDefs = [];
let currentMod = 'quiz';
let quizQ = [...QUIZ];
let quizIdx = -1;
let quizPhase = 'lobby';
let quizAnswers = {};
let timerInterval = null;
let timerLeft = 15, timerDur = 15;
let currentQ = null;
let phishIdx = 0, phishAnswers = {};
let empreinteIdx = 0;
let ctfSubmissions = {};
let cyberIdx = 0;

function pub(event, data) {
  if (channel) channel.publish(event, data);
}

function initAbly() {
  ably = new Ably.Realtime({ key: ABLY_KEY });
  ably.connection.on('connected', () => {
    document.getElementById('conn-pill').textContent = '⬤ Connecté';
    document.getElementById('conn-pill').className = 'pill on';
    document.getElementById('room-pill').textContent = 'Room: ' + ROOM;
    generateQR();
    switchMod('quiz');
    toast('Connecté !');
  });
  ably.connection.on('disconnected', () => {
    document.getElementById('conn-pill').textContent = '⬤ Déconnecté';
    document.getElementById('conn-pill').className = 'pill off';
  });
  channel = ably.channels.get('cyberconf-' + ROOM);

  channel.subscribe('player:join', msg => {
    const {id, name, team} = msg.data;
    players[id] = {name, team:team||null, score:0, correct:0, answered:false};
    if (teamDefs.length === 0) autoInitTeams();
    pub('host:teams', { teams: getTeamPayload() });
    pub('host:state', { phase: quizPhase, teams: getTeamPayload(), mod: currentMod, timeLeft: timerLeft });
    updateRight();
    toast(name + ' a rejoint !');
  });
  channel.subscribe('player:leave', msg => { delete players[msg.data.id]; updateRight(); });

  channel.subscribe('player:answer', msg => {
    const {id, answer, timeRemaining, mod} = msg.data;
    if (!players[id]) return;
    if (mod === 'quiz') {
      if (quizAnswers[id] !== undefined) return;
      quizAnswers[id] = answer;
      players[id].answered = true;
      if (currentQ && answer === currentQ.correct) {
        const pts = Math.max(50, Math.round(500 * (timeRemaining / timerDur)));
        players[id].score += pts; players[id].correct++;
      }
      updateLiveQuiz();
    } else if (mod === 'phishing') {
      phishAnswers[id] = answer;
      updateLivePhish();
    } else if (mod === 'empreinte') {
      const {qIndex, val} = answer;
      if (!players[id].emp) players[id].emp = {};
      players[id].emp[qIndex] = val;
      updateLiveEmp();
    } else if (mod === 'ctf') {
      const {challengeId, text} = answer;
      if (!ctfSubmissions[challengeId]) ctfSubmissions[challengeId] = {};
      const ch = CTF.find(c => c.id === challengeId);
      const correct = ch && ch.check(text);
      ctfSubmissions[challengeId][id] = {text, correct, name: players[id].name};
      if (correct) { players[id].score += ch.pts; players[id].correct++; }
      pub('host:ctf_result', {playerId:id, challengeId, correct, pts: correct ? ch.pts : 0});
      updateLiveCTF();
    }
    updateRight();
  });
}

function autoInitTeams() {
  teamDefs = [0,1,2].map(i => ({
    name: document.getElementById('tn'+i).value.trim() || ('Équipe '+(i+1)),
    color: document.getElementById('tc'+i).value
  }));
}

function getTeamPayload() {
  return teamDefs.map(t => ({
    name:t.name, color:t.color,
    count: Object.values(players).filter(p=>p.team===t.name).length
  }));
}

// ── QR ──
function generateQR() {
  const url = window.location.href.replace('animateur.html','joueur.html') + '?room=' + ROOM;
  document.getElementById('qr-url').textContent = url;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload = () => new QRCode(document.getElementById('qr-container'), {text:url,width:140,height:140,colorDark:'#00ff88',colorLight:'#1a2030'});
  document.head.appendChild(s);
}
function copyUrl() { navigator.clipboard.writeText(document.getElementById('qr-url').textContent); toast('Lien copié !'); }

// ── TEAMS ──
function broadcastTeams() {
  autoInitTeams();
  pub('host:teams', { teams: getTeamPayload() });
  updateLiveTeams(); updateTeamSB();
  toast('Équipes envoyées !');
}
function updateLiveTeams() {
  const el = document.getElementById('live-teams');
  if (!teamDefs.length) { el.innerHTML=''; return; }
  el.innerHTML = teamDefs.map(t => {
    const m = Object.values(players).filter(p=>p.team===t.name);
    const ts = m.reduce((s,p)=>s+p.score,0);
    return '<div class="trow" style="border-left-color:'+t.color+'">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+t.color+';flex-shrink:0"><\/div>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:700;color:'+t.color+'">'+t.name+'<\/div>'
      +'<div style="font-size:10px;color:var(--muted)">'+m.length+' joueur(s) · '+m.map(p=>p.name).slice(0,3).join(', ')+'<\/div><\/div>'
      +'<div style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+t.color+'">'+ts+'<\/div><\/div>';
  }).join('');
}
function updateTeamSB() {
  const el = document.getElementById('team-sb');
  if (!teamDefs.length) { el.innerHTML='<div style="font-size:11px;color:var(--muted)">Envoie les équipes →<\/div>'; return; }
  const sorted = teamDefs.map(t=>{const m=Object.values(players).filter(p=>p.team===t.name);return{name:t.name,color:t.color,total:m.reduce((s,p)=>s+p.score,0),count:m.length};}).sort((a,b)=>b.total-a.total);
  const r=['🥇','🥈','🥉'];
  el.innerHTML = sorted.map((t,i)=>'<div class="trow" style="border-left-color:'+t.color+'"><span>'+r[i]+'<\/span><span style="font-size:12px;font-weight:700;color:'+t.color+';flex:1;margin:0 6px">'+t.name+'<\/span><span style="font-size:10px;color:var(--muted)">'+t.count+'👤<\/span><span style="font-family:var(--mono);font-size:13px;color:'+t.color+'">'+t.total+'<\/span><\/div>').join('');
}

// ── RIGHT PANEL ──
function updateRight() {
  updateTeamSB(); updateLiveTeams();
  const pl = document.getElementById('players-list');
  const list = Object.values(players);
  if (!list.length) { pl.innerHTML='<div style="font-size:11px;color:var(--muted)">En attente...<\/div>'; }
  else pl.innerHTML = list.map(p=>{const t=p.team?teamDefs.find(x=>x.name===p.team):null;return '<div class="prow"><div class="pdot" style="background:'+(p.answered?'var(--green)':'var(--muted)')+'"><\/div><div style="font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.name+'<\/div>'+(t?'<div style="font-size:10px;font-family:var(--mono);color:'+t.color+'">'+t.name+'<\/div>':'')+'<div style="font-family:var(--mono);font-size:11px;font-weight:700;color:'+(t?t.color:'var(--green)')+'">'+p.score+'<\/div><\/div>';}).join('');
  const sb = document.getElementById('indiv-sb');
  const sorted = [...list].sort((a,b)=>b.score-a.score).slice(0,10);
  if (!sorted.length) { sb.innerHTML='<div style="font-size:11px;color:var(--muted)">Aucun score<\/div>'; return; }
  const r=['🥇','🥈','🥉'];
  sb.innerHTML = sorted.map((p,i)=>{const t=p.team?teamDefs.find(x=>x.name===p.team):null;return '<div class="srow"><div class="sr-rank">'+(r[i]||'#'+(i+1))+'<\/div><div class="sr-name" style="'+(t?'color:'+t.color:'')+'">'+p.name+'<\/div><div class="sr-pts" style="'+(t?'color:'+t.color:'')+'">'+p.score+'<\/div><\/div>';}).join('');
  document.getElementById('pcount').textContent = list.length + ' joueurs';
}

// ── MOD SWITCH ──
function switchMod(mod) {
  currentMod = mod;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('nb-'+mod).classList.add('act');
  document.getElementById('phase-pill').textContent = mod;
  if (channel) pub('host:mod_change', { mod });
  document.getElementById('live-answers').innerHTML = '<div style="font-size:11px;color:var(--muted)">—<\/div>';
  if (mod==='quiz') renderQuizCenter();
  else if (mod==='phishing') renderPhishCenter();
  else if (mod==='empreinte') renderEmpCenter();
  else if (mod==='ctf') renderCTFCenter();
  else if (mod==='password') renderPwCenter();
  else if (mod==='cyber') renderCyberCenter();
}

function applyTheme() {
  const t = document.getElementById('theme-sel').value;
  quizQ = t ? QUIZ.filter(q=>q.theme===t) : [...QUIZ];
  quizQ = [...quizQ].sort(()=>Math.random()-.5);
  quizIdx=-1; quizPhase='lobby'; renderQuizCenter();
}

function startQuiz() {
  quizQ=[...quizQ].sort(()=>Math.random()-.5);
  quizIdx=-1; quizPhase='question';
  Object.keys(players).forEach(id=>{players[id].score=0;players[id].correct=0;});
  nextQ();
}
function nextQ() {
  quizIdx++;
  if (quizIdx>=quizQ.length) { showPodium(); return; }
  currentQ=quizQ[quizIdx]; quizAnswers={};
  quizPhase='question';
  timerDur=parseInt(document.getElementById('timer-sel').value)||15;
  timerLeft=timerDur;
  Object.keys(players).forEach(id=>players[id].answered=false);
  pub('host:question',{index:quizIdx,total:quizQ.length,question:{q:currentQ.q,opts:currentQ.opts,theme:currentQ.theme},timerDuration:timerDur,mod:'quiz'});

function checkPw(pw) {
  const len=pw.length; document.getElementById('pw-len').textContent=len;
  if(!len){['pw-force','pw-time','pw-ent'].forEach(id=>document.getElementById(id).textContent='—');document.getElementById('pw-bar').style.width='0';document.getElementById('pw-tips').textContent='Tape un mot de passe pour analyser.';return;}
  let cs=0;if(/[a-z]/.test(pw))cs+=26;if(/[A-Z]/.test(pw))cs+=26;if(/[0-9]/.test(pw))cs+=10;if(/[^a-zA-Z0-9]/.test(pw))cs+=32;
  const ent=Math.round(len*Math.log2(cs||1)); document.getElementById('pw-ent').textContent=ent;
  const common=['azerty','password','123456','qwerty','azerty123','password123','admin','letmein'];
  const isCommon=common.some(c=>pw.toLowerCase().includes(c));
  let s=0;if(len>=8)s++;if(len>=12)s++;if(len>=16)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;if(isCommon)s=Math.max(0,s-3);
  const lvls=[{l:'Très faible',c:'#ff4455',p:8,t:'Instantané'},{l:'Faible',c:'#ff7744',p:22,t:'Quelques secondes'},{l:'Moyen',c:'#ffaa00',p:45,t:'Quelques heures'},{l:'Fort',c:'#44cc88',p:72,t:'Plusieurs années'},{l:'Très fort',c:'#00ff88',p:100,t:'> 1 milliard d\'années'}];
  const lv=lvls[s>5?4:s>3?3:s>2?2:s>1?1:0];
  const fe=document.getElementById('pw-force');fe.textContent=lv.l;fe.style.color=lv.c;
  document.getElementById('pw-time').textContent=lv.t;
  const bar=document.getElementById('pw-bar');bar.style.width=lv.p+'%';bar.style.background=lv.c;
  let tips=[];
  if(len<12)tips.push('→ Allonge le mot de passe (12+ caractères)');
  if(!/[A-Z]/.test(pw))tips.push('→ Ajoute des majuscules');
  if(!/[0-9]/.test(pw))tips.push('→ Ajoute des chiffres');
  if(!/[^a-zA-Z0-9]/.test(pw))tips.push('→ Ajoute des symboles');
  if(isCommon)tips.push('⚠ Trop courant — dans les listes de hackers !');
  if(s>=5)tips=['✓ Excellent ! Utilise Bitwarden pour stocker des mots de passe uniques.'];
  document.getElementById('pw-tips').innerHTML=tips.join('<br>')||'✓ Très bon !';
}

    +'<div style="font-size:13px;padding:8px;background:rgba(255,68,85,.07);border-radius:6px;border:1px solid rgba(255,68,85,.2);color:#ff9999;margin-bottom:12px">⚖️ '+s.sanctions+'<\/div>'
    +'<div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:6px">QUE FAIRE<\/div>'
    +s.queFaire.map(q=>'<div style="font-size:13px;display:flex;gap:8px;margin-bottom:4px"><span style="color:var(--green)">→<\/span>'+q+'<\/div>').join('')
    +'<\/div>'
    +'<div class="flex" style="margin-top:14px">'
    +'<button class="btn bg" onclick="document.getElementById(\'cyber-reveal\').style.display=\'block\';this.style.display=\'none\'">Révéler les infos →<\/button>'
    +'<button class="btn bo bsm" onclick="cyberIdx=Math.max(0,cyberIdx-1);renderCyberScenario()" '+(cyberIdx===0?'disabled':'')+'>← Préc<\/button>'
    +'<button class="btn bg bsm" onclick="cyberIdx=Math.min(CYBER_SCENARIOS.length-1,cyberIdx+1);renderCyberScenario()" '+(cyberIdx===CYBER_SCENARIOS.length-1?'disabled':'')+'>Suiv →<\/button>'
    +'<\/div><\/div>';
}

// ── TOAST ──
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──
initAbly();
</script>
</body>
</html>
